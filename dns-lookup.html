<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNS Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e10;
  --surface: #18181b;
  --surface-2: #1f1f23;
  --surface-3: #27272a;
  --border: #2e2e33;
  --text: #fafafa;
  --text-2: #a1a1aa;
  --text-3: #71717a;
  --accent: #22d3ee;
  --accent-dim: rgba(34,211,238,0.08);
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image:
    linear-gradient(rgba(34,211,238,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,211,238,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
}
.app { max-width: 860px; margin: 0 auto; padding: 36px 20px 80px; }

/* Header */
header { margin-bottom: 36px; animation: fadeUp .5s ease both; }
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--text-3); font-size: 13px; font-weight: 600;
  text-decoration: none; letter-spacing: .3px;
  padding: 6px 10px; border-radius: 8px;
  border: 1px solid transparent;
  transition: all .18s;
  margin-bottom: 20px;
}
.back-btn:hover { color: var(--accent); border-color: var(--border); background: var(--accent-dim); }
.back-btn .arrow { font-size: 15px; }
header h1 {
  font-size: 32px; font-weight: 800; letter-spacing: -.5px;
  line-height: 1.1; margin-bottom: 6px;
}
header h1 span { color: var(--accent); }
header p {
  font-family: 'DM Mono', monospace;
  font-size: 13px; color: var(--text-3); letter-spacing: .3px;
}

/* Input section */
.input-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
  animation: fadeUp .5s .08s ease both;
}
.input-row {
  display: flex; gap: 10px; margin-bottom: 16px;
}
.domain-input {
  flex: 1;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  outline: none;
  transition: border-color .18s;
}
.domain-input::placeholder { color: var(--text-3); }
.domain-input:focus { border-color: var(--accent); }
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 12px 20px; border-radius: 8px; border: none;
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all .18s; white-space: nowrap;
  letter-spacing: .3px;
}
.btn-primary {
  background: var(--accent); color: #0e0e10;
}
.btn-primary:hover { background: #38e5ff; transform: translateY(-1px); }
.btn-primary:active { transform: none; }
.btn-secondary {
  background: var(--surface-2); color: var(--text-2);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* Record type checkboxes */
.type-row {
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
}
.type-label {
  font-size: 11px; font-weight: 600; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .6px; margin-right: 4px;
}
.type-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 11px; border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface-2);
  cursor: pointer; transition: all .15s;
  font-family: 'DM Mono', monospace;
  font-size: 12px; font-weight: 500;
  color: var(--text-2);
  user-select: none;
}
.type-chip input { display: none; }
.type-chip:hover { border-color: var(--accent); color: var(--accent); }
.type-chip.checked {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}
.all-btn { margin-left: auto; }

/* Loading */
.spinner {
  display: none; align-items: center; gap: 10px;
  color: var(--text-3); font-size: 13px;
  font-family: 'DM Mono', monospace;
  padding: 16px 0;
}
.spinner.active { display: flex; }
.spin {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* History chips */
.history-section {
  margin-bottom: 20px;
  animation: fadeUp .5s .14s ease both;
}
.history-header {
  font-size: 11px; font-weight: 600; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px;
}
.history-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.history-chip {
  font-family: 'DM Mono', monospace;
  font-size: 12px; color: var(--text-2);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 10px;
  cursor: pointer; transition: all .15s;
}
.history-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* Results */
.results-section { animation: fadeUp .5s .18s ease both; }
.result-group {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
}
.group-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px;
  cursor: pointer;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  transition: background .15s;
  user-select: none;
}
.group-header:hover { background: var(--surface-2); }
.group-type {
  font-family: 'DM Mono', monospace;
  font-size: 12px; font-weight: 500;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid rgba(34,211,238,0.2);
  border-radius: 5px; padding: 3px 9px;
}
.group-count {
  font-size: 12px; color: var(--text-3); font-family: 'DM Mono', monospace;
}
.group-toggle {
  margin-left: auto; color: var(--text-3); font-size: 12px;
  transition: transform .2s;
}
.group-toggle.open { transform: rotate(180deg); }
.group-body { display: block; }
.group-body.collapsed { display: none; }

/* Table */
.dns-table {
  width: 100%; border-collapse: collapse;
}
.dns-table th {
  font-size: 10px; font-weight: 600; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .7px;
  text-align: left; padding: 10px 18px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
}
.dns-table td {
  padding: 11px 18px;
  font-family: 'DM Mono', monospace;
  font-size: 13px; color: var(--text-2);
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
  word-break: break-all;
}
.dns-table tr:last-child td { border-bottom: none; }
.dns-table tr:hover td { background: var(--surface-2); }
.dns-table td.name { color: var(--text); font-size: 12px; }
.dns-table td.ttl { color: var(--text-3); white-space: nowrap; }
.dns-table td.type {
  color: var(--accent);
  font-weight: 500; white-space: nowrap;
}
.dns-table td.data { color: var(--text); }
.copy-btn {
  display: inline-flex; align-items: center; gap: 4px;
  background: none; border: 1px solid var(--border);
  border-radius: 5px; padding: 3px 8px;
  color: var(--text-3); font-family: 'DM Mono', monospace;
  font-size: 11px; cursor: pointer; transition: all .15s;
  white-space: nowrap; margin-left: 8px;
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.copy-btn.copied { border-color: #34d399; color: #34d399; }
.data-cell { display: flex; align-items: flex-start; gap: 4px; }
.data-text { flex: 1; }

/* Empty / error states */
.state-box {
  text-align: center; padding: 48px 20px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius);
}
.state-box .icon { font-size: 32px; margin-bottom: 12px; }
.state-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.state-box p { font-size: 13px; color: var(--text-3); font-family: 'DM Mono', monospace; }
.state-box.error h3 { color: #f87171; }
.state-box.empty h3 { color: var(--text-2); }

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.result-group { animation: fadeUp .3s ease both; }

/* Responsive */
@media (max-width: 600px) {
  .input-row { flex-direction: column; }
  .all-btn { margin-left: 0; }
  header h1 { font-size: 24px; }
  .dns-table th:nth-child(1),
  .dns-table td:nth-child(1) { display: none; }
}
</style>
</head>
<body>
<div class="app">
  <header>
    <a href="./index.html" class="back-btn">
      <span class="arrow">←</span> 홈
    </a>
    <h1>DNS <span>Lookup</span></h1>
    <p>// DNS over HTTPS · Cloudflare DoH</p>
  </header>

  <div class="input-section">
    <div class="input-row">
      <input
        type="text" id="domainInput" class="domain-input"
        placeholder="도메인 입력 (예: example.com)"
        autocomplete="off" autocapitalize="none" spellcheck="false"
      >
      <button class="btn btn-primary" id="lookupBtn">조회</button>
    </div>
    <div class="type-row">
      <span class="type-label">레코드 유형</span>
      <label class="type-chip checked" data-type="A">
        <input type="checkbox" value="A" checked> A
      </label>
      <label class="type-chip" data-type="AAAA">
        <input type="checkbox" value="AAAA"> AAAA
      </label>
      <label class="type-chip" data-type="MX">
        <input type="checkbox" value="MX"> MX
      </label>
      <label class="type-chip" data-type="CNAME">
        <input type="checkbox" value="CNAME"> CNAME
      </label>
      <label class="type-chip" data-type="TXT">
        <input type="checkbox" value="TXT"> TXT
      </label>
      <label class="type-chip" data-type="NS">
        <input type="checkbox" value="NS"> NS
      </label>
      <label class="type-chip" data-type="SOA">
        <input type="checkbox" value="SOA"> SOA
      </label>
      <button class="btn btn-secondary all-btn" id="allBtn">전체 조회</button>
    </div>
  </div>

  <div class="history-section" id="historySection" style="display:none">
    <div class="history-header">최근 조회</div>
    <div class="history-chips" id="historyChips"></div>
  </div>

  <div class="spinner" id="spinner">
    <div class="spin"></div>
    <span>조회 중...</span>
  </div>

  <div class="results-section" id="resultsSection"></div>
</div>

<script>
const DNS_TYPES = { A:1, NS:2, CNAME:5, SOA:6, MX:15, TXT:16, AAAA:28 };
const TYPE_NAMES = Object.fromEntries(Object.entries(DNS_TYPES).map(([k,v])=>[v,k]));
const MAX_HISTORY = 10;

let history = JSON.parse(localStorage.getItem('dns_history') || '[]');

const domainInput = document.getElementById('domainInput');
const lookupBtn = document.getElementById('lookupBtn');
const allBtn = document.getElementById('allBtn');
const spinner = document.getElementById('spinner');
const resultsSection = document.getElementById('resultsSection');
const historySection = document.getElementById('historySection');
const historyChips = document.getElementById('historyChips');

// Checkbox chips
document.querySelectorAll('.type-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const cb = chip.querySelector('input[type=checkbox]');
    cb.checked = !cb.checked;
    chip.classList.toggle('checked', cb.checked);
  });
});

function getSelectedTypes() {
  return [...document.querySelectorAll('.type-chip input:checked')].map(i => i.value);
}

function selectAllTypes() {
  document.querySelectorAll('.type-chip').forEach(chip => {
    chip.querySelector('input').checked = true;
    chip.classList.add('checked');
  });
}

// History
function saveHistory(domain) {
  history = [domain, ...history.filter(d => d !== domain)].slice(0, MAX_HISTORY);
  localStorage.setItem('dns_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  if (history.length === 0) { historySection.style.display = 'none'; return; }
  historySection.style.display = 'block';
  historyChips.innerHTML = history.map(d =>
    `<span class="history-chip" data-domain="${d}">${d}</span>`
  ).join('');
  historyChips.querySelectorAll('.history-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      domainInput.value = chip.dataset.domain;
      runLookup();
    });
  });
}

// DNS fetch
async function fetchDNS(domain, type) {
  const url = `https://cloudflare-dns.com/dns-query?name=${encodeURIComponent(domain)}&type=${type}`;
  const res = await fetch(url, { headers: { Accept: 'application/dns-json' } });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function formatData(record) {
  const type = TYPE_NAMES[record.type] || record.type;
  let data = record.data;
  if (type === 'MX') {
    const parts = data.split(' ');
    data = parts.length >= 2 ? `${parts[0]} ${parts.slice(1).join(' ')}` : data;
  }
  return data;
}

function makeCopyBtn(text) {
  const btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.textContent = '복사';
  btn.addEventListener('click', () => {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '완료';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 1500);
    });
  });
  return btn;
}

function renderGroup(type, records) {
  const group = document.createElement('div');
  group.className = 'result-group';

  const header = document.createElement('div');
  header.className = 'group-header';
  header.innerHTML = `
    <span class="group-type">${type}</span>
    <span class="group-count">${records.length}개 레코드</span>
    <span class="group-toggle open">▼</span>
  `;

  const body = document.createElement('div');
  body.className = 'group-body';

  const table = document.createElement('table');
  table.className = 'dns-table';
  table.innerHTML = `
    <thead>
      <tr>
        <th>이름</th>
        <th>TTL</th>
        <th>유형</th>
        <th>데이터</th>
      </tr>
    </thead>
  `;

  const tbody = document.createElement('tbody');
  records.forEach(rec => {
    const tr = document.createElement('tr');
    const dataText = formatData(rec);
    const recTypeName = TYPE_NAMES[rec.type] || rec.type;

    const tdName = document.createElement('td');
    tdName.className = 'name';
    tdName.textContent = rec.name;

    const tdTtl = document.createElement('td');
    tdTtl.className = 'ttl';
    tdTtl.textContent = `${rec.TTL}s`;

    const tdType = document.createElement('td');
    tdType.className = 'type';
    tdType.textContent = recTypeName;

    const tdData = document.createElement('td');
    tdData.className = 'data';
    const dataCell = document.createElement('div');
    dataCell.className = 'data-cell';
    const dataSpan = document.createElement('span');
    dataSpan.className = 'data-text';
    dataSpan.textContent = dataText;
    dataCell.appendChild(dataSpan);
    dataCell.appendChild(makeCopyBtn(dataText));
    tdData.appendChild(dataCell);

    tr.append(tdName, tdTtl, tdType, tdData);
    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  body.appendChild(table);
  group.append(header, body);

  // Collapse toggle
  const toggle = header.querySelector('.group-toggle');
  header.addEventListener('click', () => {
    body.classList.toggle('collapsed');
    toggle.classList.toggle('open');
  });

  return group;
}

function renderError(message) {
  resultsSection.innerHTML = `
    <div class="state-box error">
      <div class="icon">⚠</div>
      <h3>조회 실패</h3>
      <p>${message}</p>
    </div>
  `;
}

function renderEmpty(domain) {
  resultsSection.innerHTML = `
    <div class="state-box empty">
      <div class="icon">○</div>
      <h3>레코드 없음</h3>
      <p>${domain} 에 대한 레코드를 찾을 수 없습니다</p>
    </div>
  `;
}

async function runLookup(overrideTypes) {
  const domain = domainInput.value.trim().replace(/^https?:\/\//, '').replace(/\/$/, '');
  if (!domain) { domainInput.focus(); return; }

  const types = overrideTypes || getSelectedTypes();
  if (types.length === 0) { return; }

  spinner.classList.add('active');
  resultsSection.innerHTML = '';
  lookupBtn.disabled = true;
  allBtn.disabled = true;

  try {
    const results = await Promise.allSettled(types.map(t => fetchDNS(domain, t).then(data => ({ type: t, data }))));
    const grouped = {};

    results.forEach(r => {
      if (r.status !== 'fulfilled') return;
      const { type, data } = r.value;
      if (!data.Answer || data.Answer.length === 0) return;
      grouped[type] = data.Answer;
    });

    const keys = Object.keys(grouped);
    if (keys.length === 0) {
      renderEmpty(domain);
    } else {
      keys.forEach(type => {
        const el = renderGroup(type, grouped[type]);
        resultsSection.appendChild(el);
      });
    }

    saveHistory(domain);
  } catch (err) {
    renderError(err.message || '알 수 없는 오류');
  } finally {
    spinner.classList.remove('active');
    lookupBtn.disabled = false;
    allBtn.disabled = false;
  }
}

// Events
lookupBtn.addEventListener('click', () => runLookup());
allBtn.addEventListener('click', () => {
  selectAllTypes();
  runLookup(['A','AAAA','MX','CNAME','TXT','NS']);
});
domainInput.addEventListener('keydown', e => { if (e.key === 'Enter') runLookup(); });

// Init
renderHistory();
</script>
</body>
</html>
