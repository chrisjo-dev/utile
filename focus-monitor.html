<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Monitor — utile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e10;
  --surface: #18181b;
  --surface-2: #1f1f23;
  --surface-3: #27272a;
  --border: #2e2e33;
  --text: #fafafa;
  --text-2: #a1a1aa;
  --text-3: #71717a;
  --accent: #22d3ee;
  --accent-dim: rgba(34,211,238,0.08);
  --accent-glow: rgba(34,211,238,0.15);
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --radius: 14px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(34,211,238,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,211,238,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

/* ── Layout ── */
.app {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Top Bar ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.back-link {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--text-3);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.04em;
  transition: color 0.2s;
}
.back-link:hover { color: var(--accent); }
.back-link svg { width: 14px; height: 14px; }

.topbar-title {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-3);
}

.status-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-3);
  transition: all 0.4s ease;
}
.status-badge .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-3);
  transition: background 0.4s;
}
.status-badge.focused { border-color: rgba(74,222,128,0.3); color: var(--green); background: rgba(74,222,128,0.06); }
.status-badge.focused .dot { background: var(--green); animation: pulse-dot 1.5s ease infinite; }
.status-badge.distracted { border-color: rgba(248,113,113,0.3); color: var(--red); background: rgba(248,113,113,0.06); }
.status-badge.distracted .dot { background: var(--red); }

@keyframes pulse-dot {
  0%,100% { opacity:0.6; transform:scale(1); }
  50% { opacity:1; transform:scale(1.4); }
}

/* ── Main Stage ── */
.stage {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* ── Camera PiP ── */
.pip-wrap {
  position: absolute;
  top: 20px;
  right: 28px;
  width: 160px;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--surface);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  z-index: 10;
}
.pip-wrap video {
  width: 100%;
  display: block;
  transform: scaleX(-1);
}
.pip-label {
  padding: 4px 8px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-3);
  background: var(--surface);
  text-align: center;
}

/* ── Cat character ── */
.cat-wrap {
  position: absolute;
  bottom: 60px;
  left: 28px;
  width: 160px;
  z-index: 10;
}

/* Speech bubble */
.speech-bubble {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 20px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 10px 10px 10px 2px;
  padding: 6px 12px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text);
  white-space: nowrap;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
}
.speech-bubble.visible {
  opacity: 1;
  transform: translateY(0);
}

/* Cat SVG animations */
@keyframes tail-wag {
  0%,100% { transform-origin: 90% 50%; transform: rotate(-8deg); }
  50% { transform-origin: 90% 50%; transform: rotate(8deg); }
}
@keyframes tail-still {
  0%,100% { transform-origin: 90% 50%; transform: rotate(-2deg); }
  50% { transform-origin: 90% 50%; transform: rotate(2deg); }
}
@keyframes float-zz {
  0% { opacity:0; transform: translate(0,0) scale(0.7); }
  30% { opacity:1; }
  100% { opacity:0; transform: translate(12px,-18px) scale(1); }
}
@keyframes blink {
  0%,90%,100% { transform: scaleY(1); }
  95% { transform: scaleY(0.1); }
}

.cat-svg .tail { animation: tail-still 2s ease-in-out infinite; }
.cat-svg.state-watching .tail { animation: tail-wag 0.8s ease-in-out infinite; }
.cat-svg.state-suspicious .tail { animation: tail-wag 1.2s ease-in-out infinite; }
.cat-svg.state-annoyed .tail { animation: tail-still 3s ease-in-out infinite; }
.cat-svg.state-exasperated .tail { animation: none; transform-origin: 90% 50%; transform: rotate(12deg); }

/* eye blink */
.cat-svg .eye-group { animation: blink 4s ease infinite; }
.cat-svg.state-idle .eye-group { transform: scaleY(0.05); transform-origin: center; animation: none; }

/* Zz sleep indicator */
.zz-text { display: none; }
.cat-svg.state-idle .zz-text { display: block; animation: float-zz 2s ease-in-out infinite; }

/* Cat sub-element visibility via CSS class (not inline style) */
.cat-svg .idle-eyes { display: none; }
.cat-svg.state-idle .idle-eyes { display: block; }
.cat-svg .eye-group { display: block; }
.cat-svg.state-idle .eye-group { display: none; }
.cat-svg .eyebrows { display: none; }
.cat-svg.state-annoyed .eyebrows,
.cat-svg.state-exasperated .eyebrows { display: block; }
.cat-svg .paw-face { display: none; }
.cat-svg.state-exasperated .paw-face { display: block; }

/* ── Center timer ── */
.timer-wrap {
  text-align: center;
}

.timer-display {
  font-family: 'DM Mono', monospace;
  font-size: clamp(56px, 10vw, 96px);
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--text);
  line-height: 1;
  transition: color 0.4s ease;
}
.timer-display.focused { color: var(--green); }
.timer-display.distracted { color: var(--red); }

.timer-label {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text-3);
  letter-spacing: 0.1em;
  margin-top: 8px;
}

.stats-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-top: 16px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text-2);
}

.stat-sep { color: var(--border); }

.controls {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 32px;
}

.btn {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.08em;
  padding: 10px 28px;
  border-radius: 8px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
  font-weight: 500;
}
.btn-primary:hover { background: #67e8f9; border-color: #67e8f9; }

.btn-secondary {
  background: transparent;
  color: var(--text-2);
}
.btn-secondary:hover { border-color: var(--red); color: var(--red); }

.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Timeline ── */
.timeline-wrap {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 0 28px 16px;
}

.timeline-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 6px;
}

.timeline-bar {
  width: 100%;
  height: 6px;
  background: var(--surface-2);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}

.timeline-canvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* ── Dopamine molecules overlay ── */
#molecule-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 5;
  overflow: hidden;
}

.molecule {
  position: absolute;
  opacity: 0;
  transition: opacity 1s ease;
}
.molecule.visible { opacity: 0.7; }

@keyframes float-gentle {
  0%,100% { transform: translateY(0) rotate(0deg); }
  33% { transform: translateY(-14px) rotate(5deg); }
  66% { transform: translateY(6px) rotate(-4deg); }
}
@keyframes float-fast {
  0%,100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-20px) rotate(10deg); }
  50% { transform: translateY(8px) rotate(-8deg); }
  75% { transform: translateY(-10px) rotate(4deg); }
}
@keyframes float-bounce {
  0%,100% { transform: translateY(0) rotate(0deg) scale(1); }
  20% { transform: translateY(-28px) rotate(15deg) scale(1.05); }
  40% { transform: translateY(10px) rotate(-10deg) scale(0.97); }
  60% { transform: translateY(-18px) rotate(8deg) scale(1.03); }
  80% { transform: translateY(14px) rotate(-12deg) scale(0.98); }
}
@keyframes float-party {
  0% { transform: translateY(0) rotate(0deg) scale(1); }
  15% { transform: translateY(-36px) rotate(20deg) scale(1.1); }
  30% { transform: translateY(14px) rotate(-18deg) scale(0.92); }
  45% { transform: translateY(-24px) rotate(14deg) scale(1.08); }
  60% { transform: translateY(20px) rotate(-22deg) scale(0.95); }
  75% { transform: translateY(-30px) rotate(16deg) scale(1.06); }
  90% { transform: translateY(10px) rotate(-8deg) scale(0.98); }
  100% { transform: translateY(0) rotate(0deg) scale(1); }
}

/* ── Session summary overlay ── */
#summary-overlay {
  position: fixed;
  inset: 0;
  background: rgba(14,14,16,0.95);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
}
#summary-overlay.visible { display: flex; }

.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 56px;
  max-width: 420px;
  width: 90%;
  text-align: center;
  animation: fadeUp 0.4s ease both;
}

.summary-title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}

.summary-subtitle {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text-3);
  letter-spacing: 0.08em;
  margin-bottom: 36px;
}

.summary-divider {
  height: 1px;
  background: var(--border);
  margin: 24px 0;
}

.summary-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 14px;
}

.summary-key {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text-3);
  letter-spacing: 0.06em;
}

.summary-val {
  font-family: 'DM Mono', monospace;
  font-size: 22px;
  font-weight: 500;
  color: var(--accent);
}

.summary-val.good { color: var(--green); }
.summary-val.bad { color: var(--red); }

.summary-actions {
  display: flex;
  gap: 12px;
  margin-top: 36px;
}

.summary-actions .btn { flex: 1; }

/* Camera permission prompt */
#cam-prompt {
  position: fixed;
  bottom: 80px;
  right: 28px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-3);
  max-width: 220px;
  line-height: 1.5;
  z-index: 20;
  display: none;
}
#cam-prompt.visible { display: block; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}
</style>
</head>
<body>

<div class="app">
  <!-- Top Bar -->
  <div class="topbar">
    <a class="back-link" href="./index.html">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 2L4 7l5 5"/>
      </svg>
      utile
    </a>
    <span class="topbar-title">Focus Monitor</span>
    <div class="status-badge" id="status-badge">
      <div class="dot"></div>
      <span id="status-text">IDLE</span>
    </div>
  </div>

  <!-- Stage -->
  <div class="stage">

    <!-- Camera PiP -->
    <div class="pip-wrap" id="pip-wrap">
      <video id="cam-video" autoplay playsinline muted></video>
      <div class="pip-label">camera</div>
    </div>

    <!-- Cat character -->
    <div class="cat-wrap">
      <div class="speech-bubble" id="speech-bubble">...</div>

      <svg class="cat-svg state-idle" id="cat-svg" viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg" width="160">
        <!-- Body -->
        <ellipse cx="80" cy="148" rx="44" ry="40" fill="#3a3a4a"/>

        <!-- Tail -->
        <g class="tail">
          <path d="M120 170 Q148 155 142 130 Q138 116 128 122 Q136 132 132 148 Q128 162 116 168 Z" fill="#3a3a4a"/>
        </g>

        <!-- Head -->
        <ellipse cx="80" cy="98" rx="38" ry="36" fill="#3a3a4a"/>

        <!-- Left ear -->
        <polygon points="48,72 40,45 65,65" fill="#3a3a4a"/>
        <polygon points="50,70 44,52 62,66" fill="#c08080"/>
        <!-- Right ear -->
        <polygon points="112,72 120,45 95,65" fill="#3a3a4a"/>
        <polygon points="110,70 116,52 98,66" fill="#c08080"/>

        <!-- Fur forehead highlight -->
        <ellipse cx="80" cy="80" rx="22" ry="14" fill="#454558"/>

        <!-- Face: nose + muzzle -->
        <ellipse cx="80" cy="108" rx="16" ry="10" fill="#454558"/>
        <ellipse cx="80" cy="106" rx="4" ry="3" fill="#c08080"/>
        <!-- Nostrils implied -->
        <path d="M77 107 Q80 110 83 107" stroke="#a06868" stroke-width="1" fill="none"/>

        <!-- Whiskers left -->
        <line x1="64" y1="104" x2="40" y2="100" stroke="#888" stroke-width="0.8" opacity="0.7"/>
        <line x1="64" y1="108" x2="40" y2="108" stroke="#888" stroke-width="0.8" opacity="0.7"/>
        <line x1="64" y1="112" x2="40" y2="116" stroke="#888" stroke-width="0.8" opacity="0.7"/>
        <!-- Whiskers right -->
        <line x1="96" y1="104" x2="120" y2="100" stroke="#888" stroke-width="0.8" opacity="0.7"/>
        <line x1="96" y1="108" x2="120" y2="108" stroke="#888" stroke-width="0.8" opacity="0.7"/>
        <line x1="96" y1="112" x2="120" y2="116" stroke="#888" stroke-width="0.8" opacity="0.7"/>

        <!-- Eyes -->
        <g class="eye-group">
          <!-- Left eye white -->
          <ellipse class="eye-left-bg" cx="67" cy="92" rx="9" ry="10" fill="#1a1a2e"/>
          <!-- Left pupil -->
          <ellipse class="pupil-left" cx="67" cy="92" rx="5" ry="7" fill="#111"/>
          <!-- Left shine -->
          <circle cx="70" cy="89" r="2" fill="white" opacity="0.9"/>

          <!-- Right eye white -->
          <ellipse class="eye-right-bg" cx="93" cy="92" rx="9" ry="10" fill="#1a1a2e"/>
          <!-- Right pupil -->
          <ellipse class="pupil-right" cx="93" cy="92" rx="5" ry="7" fill="#111"/>
          <!-- Right shine -->
          <circle cx="96" cy="89" r="2" fill="white" opacity="0.9"/>
        </g>

        <!-- Idle closed eyes (shown with CSS when state-idle) -->
        <g class="idle-eyes">
          <path d="M59 92 Q67 98 75 92" stroke="#888" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M85 92 Q93 98 101 92" stroke="#888" stroke-width="2" fill="none" stroke-linecap="round"/>
        </g>

        <!-- Annoyed eyebrows (hidden by default) -->
        <g class="eyebrows">
          <line x1="58" y1="80" x2="76" y2="84" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="102" y1="80" x2="84" y2="84" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
        </g>

        <!-- Exasperated paw-over-face (hidden by default) -->
        <g class="paw-face">
          <ellipse cx="80" cy="95" rx="22" ry="14" fill="#3a3a4a"/>
          <ellipse cx="72" cy="97" rx="6" ry="4" fill="#454558"/>
          <ellipse cx="80" cy="96" rx="6" ry="4" fill="#454558"/>
          <ellipse cx="88" cy="97" rx="6" ry="4" fill="#454558"/>
        </g>

        <!-- Clipboard body -->
        <rect x="52" y="158" width="56" height="36" rx="4" fill="#2a2a3a" stroke="var(--border)" stroke-width="1"/>
        <rect x="68" y="154" width="24" height="8" rx="3" fill="#1a1a2a" stroke="var(--border)" stroke-width="1"/>
        <!-- Clipboard lines -->
        <line x1="60" y1="168" x2="100" y2="168" stroke="var(--border)" stroke-width="1"/>
        <line x1="60" y1="175" x2="100" y2="175" stroke="var(--border)" stroke-width="1"/>
        <line x1="60" y1="182" x2="85" y2="182" stroke="var(--border)" stroke-width="1"/>
        <!-- Paws holding clipboard -->
        <ellipse cx="56" cy="170" rx="10" ry="7" fill="#3a3a4a"/>
        <ellipse cx="104" cy="170" rx="10" ry="7" fill="#3a3a4a"/>

        <!-- Zz sleep text (animated when idle) -->
        <text class="zz-text" x="115" y="85" fill="var(--accent)" font-size="14" font-family="DM Mono, monospace" opacity="0.8">z</text>
        <text class="zz-text" x="126" y="72" fill="var(--accent)" font-size="18" font-family="DM Mono, monospace" opacity="0.6" style="animation-delay:0.7s">Z</text>
      </svg>
    </div>

    <!-- Center Timer -->
    <div class="timer-wrap">
      <div class="timer-display" id="timer-display">00:00:00</div>
      <div class="timer-label">집중 시간</div>
      <div class="stats-row">
        <span id="eff-stat">효율 —</span>
        <span class="stat-sep">|</span>
        <span id="dist-stat">이탈 0회</span>
      </div>
      <div class="controls">
        <button class="btn btn-primary" id="btn-start">시작</button>
        <button class="btn btn-secondary" id="btn-end" disabled>종료</button>
      </div>
    </div>

  </div>

  <!-- Timeline bar -->
  <div class="timeline-wrap">
    <div class="timeline-label">// session timeline</div>
    <div class="timeline-bar">
      <canvas class="timeline-canvas" id="timeline-canvas"></canvas>
    </div>
  </div>
</div>

<!-- Dopamine molecules layer -->
<div id="molecule-layer"></div>

<!-- Camera fallback notice -->
<div id="cam-prompt">카메라 AI 로딩 실패 — 탭/유휴 감지만 사용 중</div>

<!-- Session summary overlay -->
<div id="summary-overlay">
  <div class="summary-card">
    <div class="summary-title">세션 완료</div>
    <div class="summary-subtitle">// session complete</div>
    <div class="summary-divider"></div>
    <div class="summary-row">
      <span class="summary-key">집중 시간</span>
      <span class="summary-val" id="sum-focus">—</span>
    </div>
    <div class="summary-row">
      <span class="summary-key">총 시간</span>
      <span class="summary-val" id="sum-total">—</span>
    </div>
    <div class="summary-row">
      <span class="summary-key">효율</span>
      <span class="summary-val" id="sum-eff">—</span>
    </div>
    <div class="summary-row">
      <span class="summary-key">이탈 횟수</span>
      <span class="summary-val" id="sum-dist">—</span>
    </div>
    <div class="summary-row">
      <span class="summary-key">최장 집중</span>
      <span class="summary-val" id="sum-streak">—</span>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-actions">
      <button class="btn btn-primary" id="sum-restart">새 세션 시작</button>
      <button class="btn btn-secondary" onclick="location.href='./index.html'">홈으로</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  Dopamine molecule SVG factory
// ─────────────────────────────────────────────
function makeMoleculeSVG(size = 80) {
  const c = '#22d3ee';
  const r = size / 2;
  // Hexagon ring (benzene) centered at (r, r*0.6)
  const cx = r, cy = r * 0.55;
  const hr = r * 0.28;
  const hex = [];
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 3) * i - Math.PI / 6;
    hex.push([cx + hr * Math.cos(a), cy + hr * Math.sin(a)]);
  }
  const hexPath = hex.map((p, i) => (i === 0 ? `M` : `L`) + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ') + ' Z';

  // Alternate double bonds (3 bonds)
  let doubleBonds = '';
  const innerR = hr * 0.65;
  for (let i = 0; i < 6; i += 2) {
    const a1 = (Math.PI / 3) * i - Math.PI / 6 + Math.PI / 6;
    const a2 = (Math.PI / 3) * (i + 1) - Math.PI / 6 + Math.PI / 6;
    doubleBonds += `<line x1="${(cx + innerR * Math.cos(a1)).toFixed(1)}" y1="${(cy + innerR * Math.sin(a1)).toFixed(1)}" x2="${(cx + innerR * Math.cos(a2)).toFixed(1)}" y2="${(cy + innerR * Math.sin(a2)).toFixed(1)}" stroke="${c}" stroke-width="1" opacity="0.5"/>`;
  }

  // OH group at position 3 (bottom-left vertex)
  const oh1 = hex[3]; // vertex index 3
  const oh1End = [oh1[0] - hr * 0.7, oh1[1] + hr * 0.3];
  // OH group at position 4
  const oh2 = hex[4];
  const oh2End = [oh2[0] - hr * 0.9, oh2[1] - hr * 0.1];

  // Ethylamine chain from position 0 (top-right)
  const chainStart = hex[0];
  const ch2a = [chainStart[0] + hr * 0.9, chainStart[1] - hr * 0.1];
  const ch2b = [ch2a[0] + hr * 0.9, ch2a[1] - hr * 0.3];
  const nh2 = [ch2b[0] + hr * 0.7, ch2b[1] + hr * 0.1];

  const textSize = size * 0.11;

  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
    <!-- Benzene ring -->
    <path d="${hexPath}" fill="none" stroke="${c}" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Double bonds inner -->
    ${doubleBonds}
    <!-- OH at C3 -->
    <line x1="${oh1[0].toFixed(1)}" y1="${oh1[1].toFixed(1)}" x2="${oh1End[0].toFixed(1)}" y2="${oh1End[1].toFixed(1)}" stroke="${c}" stroke-width="1.2"/>
    <text x="${oh1End[0] - 2}" y="${oh1End[1] + textSize + 1}" font-size="${textSize}" fill="${c}" font-family="DM Mono,monospace" text-anchor="middle">OH</text>
    <!-- OH at C4 -->
    <line x1="${oh2[0].toFixed(1)}" y1="${oh2[1].toFixed(1)}" x2="${oh2End[0].toFixed(1)}" y2="${oh2End[1].toFixed(1)}" stroke="${c}" stroke-width="1.2"/>
    <text x="${oh2End[0] - 2}" y="${oh2End[1] + textSize + 1}" font-size="${textSize}" fill="${c}" font-family="DM Mono,monospace" text-anchor="middle">OH</text>
    <!-- Ethylamine chain -->
    <line x1="${chainStart[0].toFixed(1)}" y1="${chainStart[1].toFixed(1)}" x2="${ch2a[0].toFixed(1)}" y2="${ch2a[1].toFixed(1)}" stroke="${c}" stroke-width="1.2"/>
    <text x="${(chainStart[0] + ch2a[0]) / 2}" y="${ch2a[1] - 2}" font-size="${textSize * 0.9}" fill="${c}" font-family="DM Mono,monospace" text-anchor="middle">CH₂</text>
    <line x1="${ch2a[0].toFixed(1)}" y1="${ch2a[1].toFixed(1)}" x2="${ch2b[0].toFixed(1)}" y2="${ch2b[1].toFixed(1)}" stroke="${c}" stroke-width="1.2"/>
    <text x="${(ch2a[0] + ch2b[0]) / 2}" y="${ch2b[1] - 2}" font-size="${textSize * 0.9}" fill="${c}" font-family="DM Mono,monospace" text-anchor="middle">CH₂</text>
    <line x1="${ch2b[0].toFixed(1)}" y1="${ch2b[1].toFixed(1)}" x2="${nh2[0].toFixed(1)}" y2="${nh2[1].toFixed(1)}" stroke="${c}" stroke-width="1.2"/>
    <text x="${nh2[0]}" y="${nh2[1] + textSize}" font-size="${textSize}" fill="${c}" font-family="DM Mono,monospace" text-anchor="middle">NH₂</text>
  </svg>`;
}

// ─────────────────────────────────────────────
//  Molecule pool
// ─────────────────────────────────────────────
const MOLECULE_COUNT = 10;
const moleculeLayer = document.getElementById('molecule-layer');
const molecules = [];

function randomBetween(a, b) { return a + Math.random() * (b - a); }

for (let i = 0; i < MOLECULE_COUNT; i++) {
  const size = randomBetween(60, 100);
  const el = document.createElement('div');
  el.className = 'molecule';
  el.innerHTML = makeMoleculeSVG(size);
  el.style.left = randomBetween(5, 90) + 'vw';
  el.style.top = randomBetween(10, 85) + 'vh';
  moleculeLayer.appendChild(el);
  molecules.push({ el, size, active: false, label: null, timeoutId: null });
}

// Label pool for party mode
const partyLabels = ['도파민!', '자극!', '딴짓!', '집중?', '...'];

function setMoleculeMode(distractedSec) {
  // How many should be visible
  let count = 0;
  let animClass = '';
  let speed = '';

  if (distractedSec <= 0) {
    count = 0;
  } else if (distractedSec < 5) {
    count = 2; animClass = 'float-gentle'; speed = '3s';
  } else if (distractedSec < 15) {
    count = 4; animClass = 'float-fast'; speed = '2s';
  } else if (distractedSec < 30) {
    count = 6; animClass = 'float-bounce'; speed = '1.5s';
  } else {
    count = MOLECULE_COUNT; animClass = 'float-party'; speed = '1s';
  }

  molecules.forEach((m, i) => {
    const shouldShow = i < count;
    if (shouldShow && !m.active) {
      m.active = true;
      m.el.classList.add('visible');
      m.el.style.animation = `${animClass} ${parseFloat(speed) + randomBetween(-0.3, 0.3)}s ease-in-out ${randomBetween(0, 0.8)}s infinite`;
      // Party mode: add small label
      if (distractedSec >= 30 && !m.label) {
        const lbl = document.createElement('div');
        lbl.style.cssText = `position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:10px;color:#22d3ee;white-space:nowrap;opacity:0.8`;
        lbl.textContent = partyLabels[i % partyLabels.length];
        m.el.style.position = 'absolute';
        m.el.appendChild(lbl);
        m.label = lbl;
      }
    } else if (!shouldShow && m.active) {
      m.active = false;
      m.el.classList.remove('visible');
      if (m.timeoutId) clearTimeout(m.timeoutId);
      const capturedEl = m.el;
      m.timeoutId = setTimeout(() => { capturedEl.style.animation = ''; m.timeoutId = null; }, 1100);
      if (m.label) { m.label.remove(); m.label = null; }
    }
  });
}

// ─────────────────────────────────────────────
//  Cat state machine
// ─────────────────────────────────────────────
const catSvg = document.getElementById('cat-svg');
const speechBubble = document.getElementById('speech-bubble');
const CAT_STATES = ['idle','watching','suspicious','annoyed','exasperated'];
const CAT_MESSAGES = {
  idle: '',
  watching: '',
  suspicious: '어디봐...',
  annoyed: '집중 좀 해 🙄',
  exasperated: '진짜야...?',
  return: '오 왔어'
};

let currentCatState = 'idle';
let speechTimeout = null;
let speechInterval = null;

function setCatState(state) {
  if (currentCatState === state) return;
  const prevState = currentCatState;
  currentCatState = state;

  // Remove all state classes
  CAT_STATES.forEach(s => catSvg.classList.remove('state-' + s));
  catSvg.classList.add('state-' + state);

  // Speech bubble
  clearTimeout(speechTimeout);
  clearInterval(speechInterval);
  speechTimeout = null;
  speechInterval = null;

  let msg = '';
  if (state === 'watching' && prevState !== 'idle') {
    msg = CAT_MESSAGES.return;
  } else {
    msg = CAT_MESSAGES[state] || '';
  }

  if (msg) {
    speechBubble.textContent = msg;
    speechBubble.classList.add('visible');
    speechTimeout = setTimeout(() => speechBubble.classList.remove('visible'), 3000);
  } else {
    speechBubble.classList.remove('visible');
    // Occasional "..." when watching
    if (state === 'watching') {
      speechInterval = setInterval(() => {
        if (Math.random() < 0.15 && currentCatState === 'watching') {
          speechBubble.textContent = '...';
          speechBubble.classList.add('visible');
          setTimeout(() => speechBubble.classList.remove('visible'), 1500);
        }
      }, 8000);
    }
  }
}

// Pupil tracking (subtle)
document.addEventListener('mousemove', e => {
  if (currentCatState !== 'watching') return;
  const rect = catSvg.getBoundingClientRect();
  const catCX = rect.left + rect.width * 0.5;
  const catCY = rect.top + rect.height * 0.55;
  const dx = (e.clientX - catCX) / window.innerWidth;
  const dy = (e.clientY - catCY) / window.innerHeight;
  const maxShift = 2.5;
  const px = Math.max(-maxShift, Math.min(maxShift, dx * 6));
  const py = Math.max(-maxShift, Math.min(maxShift, dy * 6));
  catSvg.querySelectorAll('.pupil-left, .pupil-right').forEach((p, i) => {
    const base = i === 0 ? 67 : 93;
    p.setAttribute('cx', base + px);
    p.setAttribute('cy', 92 + py);
  });
});

// ─────────────────────────────────────────────
//  Timer & session state
// ─────────────────────────────────────────────
let focusMs = 0;
let sessionMs = 0;
let distractionCount = 0;
let distractionEvents = []; // {start, end, type}
let currentDistStart = null;
let currentFocusStart = null; // track streak
let longestFocusMs = 0;

let sessionRunning = false;
let focusState = 'idle'; // 'idle' | 'focused' | 'distracted'
let lastTick = null;
let tickInterval = null;

// Score state
let scoreHistory = []; // last N scores
let avgScore = 0;
let focusHeldMs = 0;
let distractHeldMs = 0;

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return [h, m, sec].map(v => String(v).padStart(2, '0')).join(':');
}

const timerDisplay = document.getElementById('timer-display');
const timerLabel = document.querySelector('.timer-label');
const effStat = document.getElementById('eff-stat');
const distStat = document.getElementById('dist-stat');
const statusBadge = document.getElementById('status-badge');
const statusText = document.getElementById('status-text');
const timelineCanvas = document.getElementById('timeline-canvas');
const tlCtx = timelineCanvas.getContext('2d');

function updateTimerUI() {
  timerDisplay.textContent = formatTime(focusMs);

  // Efficiency
  const eff = sessionMs > 0 ? Math.round((focusMs / sessionMs) * 100) : 0;
  effStat.textContent = `효율 ${sessionMs > 0 ? eff + '%' : '—'}`;
  distStat.textContent = `이탈 ${distractionCount}회`;
}

function updateStatusUI(state) {
  if (state === 'loading') {
    statusBadge.className = 'status-badge';
    statusText.textContent = 'LOADING...';
    timerDisplay.className = 'timer-display';
    return;
  }
  statusBadge.className = 'status-badge ' + (state === 'focused' ? 'focused' : state === 'distracted' ? 'distracted' : '');
  statusText.textContent = state === 'focused' ? 'FOCUSED' : state === 'distracted' ? 'DISTRACTED' : 'IDLE';
  timerDisplay.className = 'timer-display ' + (state === 'focused' ? 'focused' : state === 'distracted' ? 'distracted' : '');
}

function drawTimeline() {
  const w = timelineCanvas.offsetWidth;
  const h = timelineCanvas.offsetHeight;
  timelineCanvas.width = w;
  timelineCanvas.height = h;

  if (sessionMs <= 0) return;

  tlCtx.clearRect(0, 0, w, h);

  // Draw distraction events as red
  distractionEvents.forEach(ev => {
    const x1 = (ev.start / sessionMs) * w;
    const x2 = ((ev.end ?? sessionMs) / sessionMs) * w;
    tlCtx.fillStyle = '#f87171';
    tlCtx.fillRect(x1, 0, Math.max(1, x2 - x1), h);
  });

  // Draw focused fill (everything that's not distraction)
  // Build focused segments
  let lastEnd = 0;
  tlCtx.fillStyle = '#4ade80';
  distractionEvents.forEach(ev => {
    if (ev.start > lastEnd) {
      const x1 = (lastEnd / sessionMs) * w;
      const x2 = (ev.start / sessionMs) * w;
      tlCtx.fillRect(x1, 0, Math.max(1, x2 - x1), h);
    }
    lastEnd = ev.end ?? sessionMs;
  });
  // Draw remaining focused segment
  if (lastEnd < sessionMs && focusState === 'focused') {
    const x1 = (lastEnd / sessionMs) * w;
    tlCtx.fillRect(x1, 0, Math.max(1, w - x1), h);
  }
}

// ─────────────────────────────────────────────
//  Detection signals
// ─────────────────────────────────────────────
let faceDetected = false;
let faceFrontal = true;
let tabVisible = !document.hidden;
let userIdle = false;
let idleTimer = null;
const IDLE_TIMEOUT = 20000; // 20s

function resetIdleTimer() {
  userIdle = false;
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => { userIdle = true; }, IDLE_TIMEOUT);
}

['mousemove','keydown','mousedown','touchstart'].forEach(e => {
  document.addEventListener(e, resetIdleTimer, { passive: true });
});
resetIdleTimer();

document.addEventListener('visibilitychange', () => {
  tabVisible = !document.hidden;
});

function computeFocusScore() {
  let score = 0;
  if (faceDetected && faceFrontal) score += 50;
  else if (faceDetected && !faceFrontal) score += 10;
  if (tabVisible) score += 30;
  if (!userIdle) score += 20;
  return score;
}

// ─────────────────────────────────────────────
//  State transition
// ─────────────────────────────────────────────
function applyFocusState(newState) {
  if (!sessionRunning) return;
  if (newState === focusState) return;

  const now = sessionMs;

  if (newState === 'focused') {
    // End distraction event
    if (currentDistStart !== null) {
      distractionEvents[distractionEvents.length - 1].end = now;
      currentDistStart = null;
    }
    currentFocusStart = now;
    focusState = 'focused';
    updateStatusUI('focused');
    setCatState('watching');
    setMoleculeMode(0);
    timerLabel.textContent = '집중 시간';
  } else if (newState === 'distracted') {
    // End focus streak
    if (currentFocusStart !== null) {
      const streak = now - currentFocusStart;
      if (streak > longestFocusMs) longestFocusMs = streak;
      currentFocusStart = null;
    }
    currentDistStart = now;
    distractionEvents.push({ start: now, end: null, type: 'distracted' });
    distractionCount++;
    focusState = 'distracted';
    updateStatusUI('distracted');
    const reasons = [];
    if (!tabVisible) reasons.push('탭 전환');
    if (!faceDetected) reasons.push('얼굴 없음');
    else if (!faceFrontal) reasons.push('시선 이탈');
    if (userIdle) reasons.push('유휴 상태');
    timerLabel.textContent = reasons.length ? reasons.join(' · ') : '집중 시간';
  }
}

// ─────────────────────────────────────────────
//  Tick loop
// ─────────────────────────────────────────────
let distractedSec = 0;

function tick() {
  if (!sessionRunning) return;

  const now = performance.now();
  const dt = lastTick ? now - lastTick : 0;
  lastTick = now;

  sessionMs += dt;
  if (focusState === 'focused') {
    focusMs += dt;
    distractedSec = 0;
  } else if (focusState === 'distracted') {
    distractedSec += dt / 1000;
  }

  // Score evaluation
  const score = computeFocusScore();
  scoreHistory.push(score);
  if (scoreHistory.length > 30) scoreHistory.shift(); // ~3s at 100ms
  avgScore = scoreHistory.reduce((a, b) => a + b, 0) / scoreHistory.length;

  if (avgScore >= 75) {
    focusHeldMs += dt;
    distractHeldMs = 0;
  } else {
    distractHeldMs += dt;
    focusHeldMs = 0;
  }

  if (focusHeldMs >= 2000 && focusState !== 'focused') {
    applyFocusState('focused');
    focusHeldMs = 0;
  } else if (distractHeldMs >= 3000 && focusState !== 'distracted') {
    applyFocusState('distracted');
    distractHeldMs = 0;
  }

  // Cat state based on distraction duration
  if (focusState === 'distracted') {
    if (distractedSec < 10) {
      setCatState('suspicious');
    } else if (distractedSec < 30) {
      setCatState('annoyed');
    } else {
      setCatState('exasperated');
    }
    setMoleculeMode(distractedSec);
  }

  updateTimerUI();
  drawTimeline();
}

// ─────────────────────────────────────────────
//  MediaPipe face detection
// ─────────────────────────────────────────────
let faceDetector = null;
let videoEl = null;
let lastVideoTime = -1;
let detectionRunning = false;
let mpFailed = false;

async function initMediaPipe() {
  // Reuse existing detector if already initialized
  if (faceDetector) {
    detectionRunning = true;
    requestAnimationFrame(detectLoop);
    return;
  }

  try {
    const { FaceDetector, FilesetResolver } = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs');

    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm'
    );

    faceDetector = await FaceDetector.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite',
        delegate: 'GPU'
      },
      runningMode: 'VIDEO',
      minDetectionConfidence: 0.5,
    });

    detectionRunning = true;
    requestAnimationFrame(detectLoop);
  } catch (e) {
    console.warn('MediaPipe init failed:', e);
    mpFailed = true;
    document.getElementById('cam-prompt').classList.add('visible');
    // Fallback: face assumed detected if tab visible
    faceDetected = true;
    faceFrontal = true;
  }
}

function detectLoop() {
  if (!detectionRunning || !videoEl || videoEl.readyState < 2) {
    requestAnimationFrame(detectLoop);
    return;
  }

  if (videoEl.currentTime !== lastVideoTime) {
    lastVideoTime = videoEl.currentTime;
    try {
      const result = faceDetector.detectForVideo(videoEl, performance.now());
      if (result.detections && result.detections.length > 0) {
        faceDetected = true;
        const det = result.detections[0];
        const kps = det.keypoints;
        // keypoints order: right_eye(0), left_eye(1), nose_tip(2), mouth_center(3), right_ear(4), left_ear(5)
        if (kps && kps.length >= 6) {
          const eyeMidX = (kps[0].x + kps[1].x) / 2;
          const bbox = det.boundingBox;
          // Normalize by face width
          const asymmetry = Math.abs(eyeMidX - (bbox.originX + bbox.width / 2) / (videoEl.videoWidth || 640)) / (bbox.width / (videoEl.videoWidth || 640) || 0.2);
          faceFrontal = asymmetry < 0.2;
        }
      } else {
        faceDetected = false;
        faceFrontal = false;
      }
    } catch (e) {
      // skip frame
    }
  }

  requestAnimationFrame(detectLoop);
}

async function startCamera() {
  try {
    videoEl = document.getElementById('cam-video');
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
    videoEl.srcObject = stream;
    await initMediaPipe();
  } catch (e) {
    console.warn('Camera failed:', e);
    mpFailed = true;
    document.getElementById('cam-prompt').classList.add('visible');
    faceDetected = true;
    faceFrontal = true;
  }
}

// ─────────────────────────────────────────────
//  Session controls
// ─────────────────────────────────────────────
const btnStart = document.getElementById('btn-start');
const btnEnd = document.getElementById('btn-end');
const summaryOverlay = document.getElementById('summary-overlay');

btnStart.addEventListener('click', async () => {
  if (sessionRunning) return;

  // Reset state
  focusMs = 0; sessionMs = 0; distractionCount = 0;
  distractionEvents = []; currentDistStart = null; currentFocusStart = null;
  longestFocusMs = 0;
  focusState = 'idle'; scoreHistory = [];
  focusHeldMs = 0; distractHeldMs = 0; distractedSec = 0;
  lastTick = null;

  btnStart.disabled = true;
  btnStart.textContent = '연결 중...';
  btnEnd.disabled = false;

  setCatState('watching');
  setMoleculeMode(0);
  updateStatusUI('loading');
  updateTimerUI();

  // Stop any existing camera stream before starting a new one
  if (videoEl && videoEl.srcObject) {
    videoEl.srcObject.getTracks().forEach(t => t.stop());
    videoEl.srcObject = null;
  }

  await startCamera();

  btnStart.textContent = '시작';

  sessionRunning = true;
  lastTick = performance.now();
  focusState = 'focused';
  currentFocusStart = 0;
  updateStatusUI('focused');
  setCatState('watching');

  tickInterval = setInterval(tick, 100);
});

btnEnd.addEventListener('click', endSession);
document.getElementById('sum-restart').addEventListener('click', () => {
  summaryOverlay.classList.remove('visible');
  btnStart.disabled = false;
  btnEnd.disabled = true;
});

function endSession() {
  if (!sessionRunning) return;
  sessionRunning = false;
  clearInterval(tickInterval);
  detectionRunning = false;

  // Finalize open distraction
  if (currentDistStart !== null && distractionEvents.length > 0) {
    distractionEvents[distractionEvents.length - 1].end = sessionMs;
  }
  // Finalize streak
  if (currentFocusStart !== null) {
    const streak = sessionMs - currentFocusStart;
    if (streak > longestFocusMs) longestFocusMs = streak;
  }

  // Stop camera
  if (videoEl && videoEl.srcObject) {
    videoEl.srcObject.getTracks().forEach(t => t.stop());
  }

  setCatState('idle');
  setMoleculeMode(0);
  updateStatusUI('idle');

  // Save to sessionStorage
  const sessionData = { focusMs, sessionMs, distractionCount, longestFocusMs, ts: Date.now() };
  try { sessionStorage.setItem('last-focus-session', JSON.stringify(sessionData)); } catch(e) {}

  showSummary();

  btnStart.disabled = false;
  btnEnd.disabled = true;
}

function showSummary() {
  const eff = sessionMs > 0 ? Math.round((focusMs / sessionMs) * 100) : 0;
  document.getElementById('sum-focus').textContent = formatTime(focusMs);
  document.getElementById('sum-total').textContent = formatTime(sessionMs);
  document.getElementById('sum-eff').textContent = eff + '%';
  document.getElementById('sum-eff').className = 'summary-val ' + (eff >= 70 ? 'good' : eff < 40 ? 'bad' : '');
  document.getElementById('sum-dist').textContent = distractionCount + '회';
  document.getElementById('sum-dist').className = 'summary-val ' + (distractionCount === 0 ? 'good' : distractionCount > 5 ? 'bad' : '');
  document.getElementById('sum-streak').textContent = formatTime(longestFocusMs);
  summaryOverlay.classList.add('visible');
}

// ─────────────────────────────────────────────
//  Timeline canvas resize
// ─────────────────────────────────────────────
const ro = new ResizeObserver(() => drawTimeline());
ro.observe(timelineCanvas);

// ─────────────────────────────────────────────
//  Keyboard shortcuts
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !sessionRunning && !btnStart.disabled) {
    e.preventDefault();
    btnStart.click();
  } else if (e.code === 'Escape') {
    if (summaryOverlay.classList.contains('visible')) {
      summaryOverlay.classList.remove('visible');
      btnStart.disabled = false;
      btnEnd.disabled = true;
    } else if (sessionRunning) {
      endSession();
    }
  }
});

// ─────────────────────────────────────────────
//  Initial cat state
// ─────────────────────────────────────────────
setCatState('idle');
updateTimerUI();
</script>
</body>
</html>
