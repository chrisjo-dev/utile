<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Optimizer</title>
<style>
:root {
  --bg: #0e0e10;
  --surface: #18181b;
  --surface-2: #1f1f23;
  --surface-3: #27272a;
  --border: #2e2e33;
  --text: #fafafa;
  --text-2: #a1a1aa;
  --text-3: #71717a;
  --accent: #22d3ee;
  --accent-dim: rgba(34,211,238,0.08);
  --success: #34d399;
  --warning: #fbbf24;
  --danger: #f87171;
  --radius: 12px;
  --mono: 'Courier New', Consolas, monospace;
  --sans: -apple-system, 'Segoe UI', system-ui, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height:100vh; }
.app { max-width:920px; margin:0 auto; padding:36px 20px; }

header { text-align:center; margin-bottom:32px; }
header h1 { font-size:26px; font-weight:700; }
header h1 span { color: var(--accent); }
header p { color: var(--text-3); font-size:13px; margin-top:4px; }

.dropzone {
  border:2px dashed var(--border); border-radius:var(--radius);
  padding:44px 20px; text-align:center; cursor:pointer;
  background:var(--surface); transition:all .2s; position:relative;
}
.dropzone:hover, .dropzone.over { border-color:var(--accent); background:var(--accent-dim); }
.dropzone .icon { font-size:28px; margin-bottom:10px; }
.dropzone h3 { font-size:15px; font-weight:600; }
.dropzone p { color:var(--text-3); font-size:12px; margin-top:4px; }
.dropzone input { position:absolute; inset:0; opacity:0; cursor:pointer; }

.settings { display:grid; grid-template-columns:repeat(auto-fit,minmax(195px,1fr)); gap:10px; margin:20px 0; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; }
.card label.title { display:block; font-size:11px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
.card select, .card input[type=number] {
  width:100%; background:var(--surface-2); border:1px solid var(--border);
  border-radius:6px; padding:8px 10px; color:var(--text);
  font-family:var(--mono); font-size:13px; outline:none;
}
.card select:focus, .card input:focus { border-color:var(--accent); }
.card select option { background:var(--surface-2); }
.row { display:flex; gap:6px; align-items:center; }
.row input { flex:1; }
.row span { color:var(--text-3); font-size:13px; font-family:var(--mono); }
.chk { display:flex; align-items:center; gap:6px; margin-top:7px; font-size:12px; color:var(--text-2); cursor:pointer; }
.chk input { accent-color:var(--accent); width:15px; height:15px; }

.actions { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.btn {
  padding:9px 18px; border-radius:8px; font-size:13px; font-weight:600;
  cursor:pointer; border:none; font-family:var(--sans); transition:opacity .15s;
}
.btn:disabled { opacity:.35; cursor:not-allowed; }
.btn-pri { background:var(--accent); color:var(--bg); }
.btn-sec { background:var(--surface-2); color:var(--text); border:1px solid var(--border); }
.btn-del { background:transparent; color:var(--danger); border:1px solid var(--danger); }

.summary { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:18px; margin-bottom:18px; display:none; }
.summary.show { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; text-align:center; }
.stat-val { font-size:20px; font-weight:700; font-family:var(--mono); }
.stat-val.cyan { color:var(--accent); }
.stat-val.green { color:var(--success); }
.stat-lbl { font-size:11px; color:var(--text-3); margin-top:2px; }

.file-list { display:flex; flex-direction:column; gap:6px; }
.empty { text-align:center; padding:28px; color:var(--text-3); font-size:13px; }

.item {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:12px 14px; display:flex; align-items:center; gap:12px;
}
.item img { width:44px; height:44px; border-radius:6px; object-fit:cover; background:var(--surface-2); flex-shrink:0; }
.item .info { flex:1; min-width:0; }
.item .name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.item .meta { display:flex; gap:10px; font-size:11px; font-family:var(--mono); color:var(--text-3); margin-top:2px; flex-wrap:wrap; }
.item .meta .warn { color:var(--warning); }
.item .result { display:flex; gap:10px; font-size:11px; font-family:var(--mono); color:var(--text-2); margin-top:2px; }
.item .result .saved { color:var(--success); font-weight:600; }
.item .result .bigger { color:var(--danger); }
.item .btns { display:flex; gap:4px; flex-shrink:0; }
.ibtn {
  width:30px; height:30px; border-radius:6px; border:1px solid var(--border);
  background:transparent; color:var(--text-3); cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-size:13px;
}
.ibtn:hover { color:var(--text); border-color:var(--text-3); }

@media(max-width:600px) {
  .app { padding:20px 14px; }
  .settings { grid-template-columns:1fr 1fr; }
  .summary.show { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Image <span>Optimizer</span></h1>
    <p>드래그 앤 드롭으로 이미지 일괄 최적화 · 로컬 전용, 서버 업로드 없음</p>
  </header>

  <div class="dropzone" id="dz">
    <div class="icon">📁</div>
    <h3>이미지를 여기에 드롭하세요</h3>
    <p>또는 클릭하여 파일 선택 (PNG, JPG, WebP, GIF, BMP)</p>
    <input type="file" id="fi" multiple accept="image/*">
  </div>

  <div class="settings">
    <div class="card">
      <label class="title">출력 포맷</label>
      <select id="sFormat">
        <option value="auto">자동 (원본 포맷 감지)</option>
        <option value="jpeg" selected>JPEG</option>
        <option value="png">PNG</option>
        <option value="webp">WebP</option>
      </select>
    </div>
    <div class="card">
      <label class="title">최대 용량 (KB)</label>
      <input type="number" id="sMaxKB" value="1024" min="50" max="10240" step="50">
    </div>
    <div class="card">
      <label class="title">최대 해상도 (px)</label>
      <div class="row">
        <input type="number" id="sMaxW" value="1920" min="100" max="8000" step="10">
        <span>×</span>
        <input type="number" id="sMaxH" value="1080" min="100" max="8000" step="10">
      </div>
      <label class="chk"><input type="checkbox" id="sKeep" checked>비율 유지</label>
    </div>
    <div class="card">
      <label class="title">JPEG 품질</label>
      <div class="row">
        <input type="number" id="sQual" value="92" min="10" max="100" step="1">
        <span>%</span>
      </div>
      <label class="chk"><input type="checkbox" id="sAuto" checked>용량 초과 시 자동 조절</label>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-pri" id="bProc" disabled>⚡ 일괄 변환</button>
    <button class="btn btn-sec" id="bDL" disabled>↓ 전체 다운로드</button>
    <button class="btn btn-del" id="bClr" disabled>✕ 전체 삭제</button>
  </div>

  <div class="summary" id="sum">
    <div><div class="stat-val cyan" id="sN">0</div><div class="stat-lbl">처리 완료</div></div>
    <div><div class="stat-val" id="sOrig">0</div><div class="stat-lbl">원본 합계</div></div>
    <div><div class="stat-val" id="sOpt">0</div><div class="stat-lbl">최적화 합계</div></div>
    <div><div class="stat-val green" id="sSav">0%</div><div class="stat-lbl">절감률</div></div>
  </div>

  <div class="file-list" id="list">
    <div class="empty" id="empty">파일을 추가하면 여기에 표시됩니다</div>
  </div>
</div>

<script>
const $ = s => document.getElementById(s);
const files = [];

function detectFmt(buf) {
  const b = new Uint8Array(buf.slice(0,12));
  if(b[0]===0xFF&&b[1]===0xD8&&b[2]===0xFF) return 'jpeg';
  if(b[0]===0x89&&b[1]===0x50&&b[2]===0x4E&&b[3]===0x47) return 'png';
  if(b[0]===0x52&&b[1]===0x49&&b[2]===0x46&&b[3]===0x46&&b[8]===0x57&&b[9]===0x45&&b[10]===0x42&&b[11]===0x50) return 'webp';
  if(b[0]===0x47&&b[1]===0x49&&b[2]===0x46) return 'gif';
  if(b[0]===0x42&&b[1]===0x4D) return 'bmp';
  return null;
}

function fmtSize(n) {
  if(n<1024) return n+' B';
  if(n<1048576) return (n/1024).toFixed(1)+' KB';
  return (n/1048576).toFixed(2)+' MB';
}

function ext(f) { return {jpeg:'jpg',png:'png',webp:'webp',gif:'gif',bmp:'bmp'}[f]||'jpg'; }
function toMime(f) { return f==='jpeg'?'image/jpeg':'image/'+f; }
function loadImg(src) { return new Promise(r=>{ const i=new Image(); i.onload=()=>r(i); i.src=src; }); }

// Drag & drop
const dz = $('dz');
const fi = $('fi');
let dc = 0;
dz.addEventListener('dragenter', e=>{ e.preventDefault(); dc++; dz.classList.add('over'); });
dz.addEventListener('dragleave', e=>{ e.preventDefault(); dc--; if(!dc) dz.classList.remove('over'); });
dz.addEventListener('dragover', e=>{ e.preventDefault(); });
dz.addEventListener('drop', e=>{ e.preventDefault(); dc=0; dz.classList.remove('over'); addFiles(e.dataTransfer.files); });
fi.addEventListener('change', ()=>{ addFiles(fi.files); fi.value=''; });

async function addFiles(list) {
  for(const file of list) {
    if(!file.type.startsWith('image/')) continue;
    const buf = await file.arrayBuffer();
    const det = detectFmt(buf);
    const e = file.name.split('.').pop().toLowerCase();
    const mis = det && det!==e && !(det==='jpeg'&&e==='jpg');
    const url = URL.createObjectURL(file);
    const img = await loadImg(url);
    files.push({
      id: Date.now()+Math.random(), file, name:file.name, size:file.size,
      w:img.naturalWidth, h:img.naturalHeight, det, extName:e, mis, url,
      done:false, blob:null, os:null, ow:null, oh:null, of:null, on:null
    });
  }
  render();
}

function render() {
  const el = $('list');
  $('empty').style.display = files.length ? 'none' : 'block';
  el.querySelectorAll('.item').forEach(n=>n.remove());

  files.forEach((f,i) => {
    const d = document.createElement('div');
    d.className = 'item';
    let rHTML = '';
    if(f.done) {
      const less = f.os < f.size;
      const pct = less ? ((1-f.os/f.size)*100).toFixed(1) : (((f.os/f.size)-1)*100).toFixed(1);
      rHTML = '<div class="result">'
        + '<span>'+f.ow+'×'+f.oh+'</span>'
        + '<span>→ '+fmtSize(f.os)+'</span>'
        + '<span class="'+(less?'saved':'bigger')+'">'+(less?'-':'+')+pct+'%</span>'
        + '</div>';
    }
    d.innerHTML = '<img src="'+f.url+'" alt="">'
      + '<div class="info">'
      + '<div class="name">'+f.name+'</div>'
      + '<div class="meta">'
      + '<span>'+f.w+'×'+f.h+'</span>'
      + '<span>'+fmtSize(f.size)+'</span>'
      + '<span>'+(f.det||'?')+'</span>'
      + (f.mis ? '<span class="warn">⚠ 실제: '+f.det+'</span>' : '')
      + '</div>' + rHTML + '</div>'
      + '<div class="btns">'
      + (f.done ? '<button class="ibtn" data-dl="'+i+'" title="다운로드">↓</button>' : '')
      + '<button class="ibtn" data-rm="'+i+'" title="삭제">✕</button>'
      + '</div>';
    el.appendChild(d);
  });

  $('bProc').disabled = !files.length;
  $('bClr').disabled = !files.length;
  $('bDL').disabled = !files.some(f=>f.done);
}

$('list').addEventListener('click', e => {
  const dl = e.target.closest('[data-dl]');
  const rm = e.target.closest('[data-rm]');
  if(dl) dlOne(+dl.dataset.dl);
  if(rm) { URL.revokeObjectURL(files[+rm.dataset.rm].url); files.splice(+rm.dataset.rm,1); render(); updateSum(); }
});

$('bProc').addEventListener('click', async () => {
  const btn = $('bProc');
  btn.disabled = true; btn.textContent = '⏳ 처리 중...';

  const fmt = $('sFormat').value;
  const maxB = +$('sMaxKB').value * 1024;
  const maxW = +$('sMaxW').value;
  const maxH = +$('sMaxH').value;
  const keep = $('sKeep').checked;
  const qual = +$('sQual').value / 100;
  const autoQ = $('sAuto').checked;

  for(let i=0; i<files.length; i++) {
    const f = files[i];
    const img = await loadImg(f.url);
    const of = fmt==='auto' ? (f.det||'jpeg') : fmt;

    let w=img.naturalWidth, h=img.naturalHeight;
    if(w>maxW||h>maxH) {
      if(keep) { const r=Math.min(maxW/w,maxH/h); w=Math.round(w*r); h=Math.round(h*r); }
      else { w=Math.min(w,maxW); h=Math.min(h,maxH); }
    }

    const c = document.createElement('canvas');
    c.width=w; c.height=h;
    const ctx = c.getContext('2d');
    ctx.drawImage(img,0,0,w,h);

    const m = toMime(of);
    let q = qual;
    let blob = await new Promise(r=>c.toBlob(r,m,q));

    if(autoQ && blob.size>maxB) {
      if(of==='png') {
        let sc=0.95;
        while(blob.size>maxB && sc>0.3) {
          const nw=Math.round(w*sc), nh=Math.round(h*sc);
          c.width=nw; c.height=nh;
          ctx.drawImage(img,0,0,nw,nh);
          blob = await new Promise(r=>c.toBlob(r,'image/png'));
          w=nw; h=nh; sc-=0.05;
        }
      } else {
        while(q>0.1 && blob.size>maxB) {
          q-=0.05;
          blob = await new Promise(r=>c.toBlob(r,m,q));
        }
      }
    }

    f.done=true; f.blob=blob; f.os=blob.size; f.ow=w; f.oh=h; f.of=of;
    f.on = f.name.replace(/\.[^.]+$/,'') + '.' + ext(of);
    render();
  }

  btn.textContent='⚡ 일괄 변환'; btn.disabled=false;
  $('bDL').disabled=false;
  updateSum();
});

function updateSum() {
  const done = files.filter(f=>f.done);
  if(!done.length) { $('sum').classList.remove('show'); return; }
  const orig = done.reduce((s,f)=>s+f.size,0);
  const opt = done.reduce((s,f)=>s+f.os,0);
  $('sN').textContent = done.length;
  $('sOrig').textContent = fmtSize(orig);
  $('sOpt').textContent = fmtSize(opt);
  $('sSav').textContent = (orig?((1-opt/orig)*100):0).toFixed(1)+'%';
  $('sum').classList.add('show');
}

function dlOne(i) {
  const f=files[i]; if(!f.blob) return;
  const u=URL.createObjectURL(f.blob);
  const a=document.createElement('a'); a.href=u; a.download=f.on; a.click();
  setTimeout(()=>URL.revokeObjectURL(u), 1000);
}

$('bDL').addEventListener('click', () => {
  files.forEach((f,i)=>{ if(f.done) setTimeout(()=>dlOne(i), i*300); });
});

$('bClr').addEventListener('click', () => {
  files.forEach(f=>URL.revokeObjectURL(f.url));
  files.length=0; render(); $('sum').classList.remove('show');
});
</script>
</body>
</html>
