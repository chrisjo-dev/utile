<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뽀모도로 타이머 — utile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e10;
  --surface: #18181b;
  --surface-2: #1f1f23;
  --surface-3: #27272a;
  --border: #2e2e33;
  --text: #fafafa;
  --text-2: #a1a1aa;
  --text-3: #71717a;
  --accent: #22d3ee;
  --accent-dim: rgba(34,211,238,0.08);
  --radius: 12px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(34,211,238,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,211,238,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 680px;
  margin: 0 auto;
  padding: 36px 20px 80px;
}

/* Header */
header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 48px;
  animation: fadeUp 0.5s ease both;
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-3);
  text-decoration: none;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.05em;
  transition: color 0.2s;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  white-space: nowrap;
}
.back-btn:hover { color: var(--accent); border-color: rgba(34,211,238,0.3); }

.header-info { flex: 1; }

h1 {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.02em;
}
h1 span { color: var(--accent); }

.header-sub {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text-3);
  margin-top: 4px;
}

/* Mode tabs */
.mode-tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 40px;
  animation: fadeUp 0.5s ease 0.1s both;
}

.mode-tab {
  flex: 1;
  padding: 9px 10px;
  border: none;
  border-radius: 7px;
  background: transparent;
  color: var(--text-3);
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.mode-tab:hover { color: var(--text-2); background: var(--surface-2); }
.mode-tab.active { background: var(--surface-3); color: var(--text); }
.mode-tab .tab-label { font-size: 13px; }
.mode-tab .tab-dur {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-3);
  cursor: pointer;
  outline: none;
  border: none;
  background: transparent;
  text-align: center;
  width: 36px;
  padding: 0;
}
.mode-tab.active .tab-dur { color: var(--accent); }
.mode-tab .tab-dur:focus {
  color: var(--accent);
  border-bottom: 1px solid var(--accent);
}

/* Ring area */
.ring-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 40px;
  animation: fadeUp 0.5s ease 0.15s both;
}

.ring-wrap {
  position: relative;
  width: 280px;
  height: 280px;
}

.ring-wrap svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.ring-track {
  fill: none;
  stroke: var(--surface-3);
  stroke-width: 10;
}

.ring-progress {
  fill: none;
  stroke: var(--accent);
  stroke-width: 10;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.5s linear;
}

.ring-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.time-display {
  font-family: 'DM Mono', monospace;
  font-size: 58px;
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1;
  color: var(--text);
}

.mode-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

@keyframes ringPulse {
  0%, 100% { filter: drop-shadow(0 0 6px rgba(34,211,238,0.4)); stroke: var(--accent); }
  50% { filter: drop-shadow(0 0 20px rgba(34,211,238,0.9)); stroke: #7ff0fc; }
}

.ring-progress.done {
  animation: ringPulse 1s ease-in-out infinite;
}

/* Controls */
.controls {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 36px;
  animation: fadeUp 0.5s ease 0.2s both;
}

.btn {
  padding: 11px 28px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Syne', sans-serif;
  cursor: pointer;
  border: none;
  transition: opacity 0.15s, transform 0.1s;
}
.btn:active { transform: scale(0.97); }

.btn-start {
  background: var(--accent);
  color: var(--bg);
  min-width: 110px;
}
.btn-start:hover { opacity: 0.88; }

.btn-reset {
  background: var(--surface-2);
  color: var(--text-2);
  border: 1px solid var(--border);
}
.btn-reset:hover { color: var(--text); border-color: var(--text-3); }

/* Session counter */
.session-counter {
  text-align: center;
  animation: fadeUp 0.5s ease 0.25s both;
}

.session-dots {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 10px;
}

.session-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--surface-3);
  border: 1.5px solid var(--border);
  transition: all 0.3s;
}
.session-dot.filled {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 8px rgba(34,211,238,0.4);
}

.session-text {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text-3);
}
.session-text strong {
  color: var(--accent);
  font-weight: 500;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="app">

  <header>
    <a href="./index.html" class="back-btn">← 홈</a>
    <div class="header-info">
      <h1>뽀모<span>도로</span></h1>
      <div class="header-sub">집중 / 휴식 사이클 타이머</div>
    </div>
  </header>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="focus" onclick="switchMode('focus')">
      <span class="tab-label">집중</span>
      <input class="tab-dur" id="dur-focus" type="text" value="25" title="클릭하여 편집" onclick="event.stopPropagation()" onchange="onDurChange('focus', this.value)" onblur="onDurBlur('focus', this.value)">
    </button>
    <button class="mode-tab" data-mode="short" onclick="switchMode('short')">
      <span class="tab-label">짧은 휴식</span>
      <input class="tab-dur" id="dur-short" type="text" value="5" title="클릭하여 편집" onclick="event.stopPropagation()" onchange="onDurChange('short', this.value)" onblur="onDurBlur('short', this.value)">
    </button>
    <button class="mode-tab" data-mode="long" onclick="switchMode('long')">
      <span class="tab-label">긴 휴식</span>
      <input class="tab-dur" id="dur-long" type="text" value="15" title="클릭하여 편집" onclick="event.stopPropagation()" onchange="onDurChange('long', this.value)" onblur="onDurBlur('long', this.value)">
    </button>
  </div>

  <div class="ring-area">
    <div class="ring-wrap">
      <svg viewBox="0 0 280 280">
        <circle class="ring-track" cx="140" cy="140" r="125"/>
        <circle class="ring-progress" id="ring" cx="140" cy="140" r="125"/>
      </svg>
      <div class="ring-center">
        <div class="time-display" id="timeDisplay">25:00</div>
        <div class="mode-label" id="modeLabel">집중</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-start" id="startBtn" onclick="toggleStart()">시작</button>
    <button class="btn btn-reset" onclick="resetTimer()">초기화</button>
  </div>

  <div class="session-counter">
    <div class="session-dots" id="sessionDots"></div>
    <div class="session-text">오늘 <strong id="sessionCount">0</strong> 포모도로 완료</div>
  </div>

</div>

<script>
const MODES = {
  focus: { label: '집중', key: 'focus' },
  short: { label: '짧은 휴식', key: 'short' },
  long:  { label: '긴 휴식',  key: 'long'  },
};

const durations = { focus: 25, short: 5, long: 15 };
let currentMode = 'focus';
let totalSeconds = 0;
let remaining = 0;
let running = false;
let timerId = null;
let sessions = 0;

const CIRCUMFERENCE = 2 * Math.PI * 125;

const ring       = document.getElementById('ring');
const timeDisp   = document.getElementById('timeDisplay');
const modeLabel  = document.getElementById('modeLabel');
const startBtn   = document.getElementById('startBtn');
const sessionCnt = document.getElementById('sessionCount');
const dotsCont   = document.getElementById('sessionDots');

ring.style.strokeDasharray = CIRCUMFERENCE;

function fmt(s) {
  const m = Math.floor(s / 60);
  const ss = s % 60;
  return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

function setRingProgress(fraction) {
  const offset = CIRCUMFERENCE * (1 - fraction);
  ring.style.strokeDashoffset = offset;
}

function updateDisplay() {
  timeDisp.textContent = fmt(remaining);
  const fraction = totalSeconds > 0 ? remaining / totalSeconds : 1;
  setRingProgress(fraction);
  document.title = `${fmt(remaining)} — ${MODES[currentMode].label} · utile`;
}

function switchMode(mode) {
  if (running) return;
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  totalSeconds = durations[mode] * 60;
  remaining = totalSeconds;
  ring.classList.remove('done');
  updateDisplay();
  modeLabel.textContent = MODES[mode].label;
  startBtn.textContent = '시작';
}

function toggleStart() {
  if (running) {
    pause();
  } else {
    start();
  }
}

function start() {
  if (remaining === 0) return;
  running = true;
  ring.classList.remove('done');
  startBtn.textContent = '일시정지';
  timerId = setInterval(() => {
    remaining--;
    updateDisplay();
    if (remaining <= 0) {
      clearInterval(timerId);
      running = false;
      onComplete();
    }
  }, 1000);
}

function pause() {
  running = false;
  clearInterval(timerId);
  startBtn.textContent = '계속';
}

function resetTimer() {
  clearInterval(timerId);
  running = false;
  totalSeconds = durations[currentMode] * 60;
  remaining = totalSeconds;
  ring.classList.remove('done');
  startBtn.textContent = '시작';
  updateDisplay();
}

function onComplete() {
  ring.classList.add('done');
  startBtn.textContent = '시작';
  document.title = `완료! — ${MODES[currentMode].label} · utile`;
  if (currentMode === 'focus') {
    sessions++;
    sessionCnt.textContent = sessions;
    renderDots();
  }
  playBeep();
}

function renderDots() {
  dotsCont.innerHTML = '';
  const total = Math.max(sessions, 4);
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'session-dot' + (i < sessions ? ' filled' : '');
    dotsCont.appendChild(d);
  }
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const seq = [
      { freq: 880, start: 0,    dur: 0.12 },
      { freq: 880, start: 0.15, dur: 0.12 },
      { freq: 1100,start: 0.30, dur: 0.22 },
    ];
    seq.forEach(({ freq, start, dur }) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime + start);
      gain.gain.linearRampToValueAtTime(0.25, ctx.currentTime + start + 0.01);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + start + dur);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur + 0.05);
    });
  } catch(e) { /* AudioContext not available */ }
}

function onDurChange(mode, val) {
  const mins = parseInt(val, 10);
  if (!isNaN(mins) && mins > 0 && mins <= 99) {
    durations[mode] = mins;
    if (mode === currentMode && !running) {
      totalSeconds = mins * 60;
      remaining = totalSeconds;
      updateDisplay();
    }
  }
}

function onDurBlur(mode, val) {
  const mins = parseInt(val, 10);
  const el = document.getElementById('dur-' + mode);
  if (isNaN(mins) || mins <= 0 || mins > 99) {
    el.value = durations[mode];
  } else {
    durations[mode] = mins;
    el.value = mins;
    if (mode === currentMode && !running) {
      totalSeconds = mins * 60;
      remaining = totalSeconds;
      updateDisplay();
    }
  }
}

// Init
renderDots();
totalSeconds = durations[currentMode] * 60;
remaining = totalSeconds;
updateDisplay();
</script>
</body>
</html>
