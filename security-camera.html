<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Camera — utile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e10;
  --surface: #18181b;
  --surface-2: #1f1f23;
  --surface-3: #27272a;
  --border: #2e2e33;
  --text: #fafafa;
  --text-2: #a1a1aa;
  --text-3: #71717a;
  --accent: #22d3ee;
  --accent-dim: rgba(34,211,238,0.08);
  --accent-glow: rgba(34,211,238,0.15);
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --radius: 14px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  user-select: none;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(34,211,238,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,211,238,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Top Bar ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.back-link {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--text-3);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.04em;
  transition: color 0.2s;
}
.back-link:hover { color: var(--accent); }
.back-link svg { width:16px; height:16px; }

.topbar-title {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.topbar-title h1 {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.topbar-title .sub {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.06em;
}

.topbar-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text-3);
}

#status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-3);
  transition: background 0.3s;
}
#status-dot.armed { background: var(--red); box-shadow: 0 0 8px var(--red); animation: blink 1.2s ease infinite; }
#status-dot.disarmed { background: var(--text-3); box-shadow: none; animation: none; }
#status-dot.motion { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ── Main Layout ── */
.main {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 0;
  min-height: 0;
}

/* ── Camera Panel ── */
.camera-panel {
  display: flex;
  flex-direction: column;
  padding: 20px 20px 20px 28px;
  gap: 16px;
  border-right: 1px solid var(--border);
}

.camera-wrap {
  position: relative;
  background: #000;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
  flex: 1;
  max-height: calc(100vh - 260px);
}

#video { display: none; }

#canvas-video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

#canvas-overlay {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.camera-hud {
  position: absolute;
  top: 12px;
  left: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  pointer-events: none;
}

.hud-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--accent);
  text-shadow: 0 0 8px var(--accent);
  opacity: 0.85;
}

.camera-hud-br {
  position: absolute;
  bottom: 12px;
  right: 12px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  pointer-events: none;
}

#rec-indicator {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--red);
  opacity: 0;
  transition: opacity 0.3s;
}
#rec-indicator.active { opacity: 1; }
#rec-indicator .rec-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--red);
  animation: blink 0.8s ease infinite;
}

#motion-banner {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.2em;
  color: var(--red);
  text-shadow: 0 0 12px var(--red);
  background: rgba(0,0,0,0.75);
  border: 1px solid var(--red);
  padding: 6px 14px;
  border-radius: 4px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}
#motion-banner.active { opacity: 1; }

.no-camera-msg {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-3);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.06em;
}
.no-camera-msg svg { opacity: 0.3; }

/* ── Controls Bar ── */
.controls-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.btn {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.08em;
  padding: 8px 18px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  white-space: nowrap;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}
.btn.danger {
  background: rgba(248,113,113,0.08);
  border-color: var(--red);
  color: var(--red);
}
.btn.danger:hover {
  background: rgba(248,113,113,0.15);
}
.btn.active-armed {
  background: rgba(248,113,113,0.12);
  border-color: var(--red);
  color: var(--red);
  box-shadow: 0 0 12px rgba(248,113,113,0.2);
}

.sep { width: 1px; height: 28px; background: var(--border); }

.ctrl-group {
  display: flex;
  align-items: center;
  gap: 8px;
}
.ctrl-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.06em;
  white-space: nowrap;
}

/* Grid selector */
.grid-opts {
  display: flex;
  gap: 4px;
}
.grid-btn {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-3);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.04em;
}
.grid-btn:hover { border-color: var(--accent); color: var(--accent); }
.grid-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

/* Sensitivity slider */
.slider-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}
input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  width: 100px;
  height: 4px;
  background: var(--surface-3);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  cursor: pointer;
}
input[type=range]::-moz-range-thumb {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  cursor: pointer;
}
.slider-val {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--accent);
  width: 28px;
  text-align: right;
}

/* ── Right Panel ── */
.right-panel {
  display: flex;
  flex-direction: column;
  padding: 20px;
  gap: 20px;
  overflow-y: auto;
}

.panel-section {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.section-title {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--text-3);
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}

/* Zone heat map */
.zone-grid-display {
  display: grid;
  gap: 4px;
}
.zone-cell {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 4px;
  gap: 4px;
  transition: border-color 0.2s, background 0.2s;
  min-height: 52px;
}
.zone-cell.alert {
  border-color: var(--red);
  background: rgba(248,113,113,0.08);
  box-shadow: 0 0 8px rgba(248,113,113,0.15);
}
.zone-cell.warn {
  border-color: var(--yellow);
  background: rgba(251,191,36,0.06);
}
.zone-cell-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--text-3);
  letter-spacing: 0.06em;
}
.zone-cell-score {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-2);
  transition: color 0.2s;
}
.zone-cell.alert .zone-cell-score { color: var(--red); }
.zone-cell.warn .zone-cell-score { color: var(--yellow); }

.zone-bar {
  width: 80%;
  height: 3px;
  background: var(--surface-3);
  border-radius: 2px;
  overflow: hidden;
}
.zone-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.15s, background 0.2s;
}
.zone-cell.alert .zone-bar-fill { background: var(--red); }
.zone-cell.warn .zone-bar-fill { background: var(--yellow); }

/* Detection log */
.log-wrap {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow-y: auto;
  max-height: 260px;
  min-height: 80px;
}

.log-entry {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  line-height: 1.4;
  animation: fadeIn 0.3s ease;
}
.log-entry:last-child { border-bottom: none; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.log-time {
  color: var(--text-3);
  flex-shrink: 0;
  font-size: 10px;
  margin-top: 1px;
}
.log-msg { color: var(--text-2); }
.log-msg .zone-tag { color: var(--accent); }
.log-msg .alert-tag { color: var(--red); }

.log-empty {
  padding: 24px 12px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-3);
  text-align: center;
  letter-spacing: 0.06em;
}

.log-controls {
  display: flex;
  justify-content: flex-end;
}
.btn-sm {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-3);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}
.btn-sm:hover { border-color: var(--red); color: var(--red); }

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.stat-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.stat-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--text-3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.stat-value {
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
}
.stat-value.accent { color: var(--accent); }
.stat-value.red { color: var(--red); }
</style>
</head>
<body>
<div class="app">

  <!-- Top Bar -->
  <header class="topbar">
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M10 12L6 8l4-4"/>
      </svg>
      utile
    </a>
    <div class="topbar-title">
      <h1>Security Camera</h1>
      <span class="sub">MOTION DETECTION SYSTEM</span>
    </div>
    <div class="topbar-status">
      <div id="status-dot" class="disarmed"></div>
      <span id="status-text" style="font-size:11px;letter-spacing:0.1em;">DISARMED</span>
    </div>
  </header>

  <!-- Main -->
  <div class="main">

    <!-- Camera Panel -->
    <div class="camera-panel">
      <div class="camera-wrap" id="camera-wrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas-video"></canvas>
        <canvas id="canvas-overlay"></canvas>

        <div class="camera-hud">
          <span class="hud-tag">SRV-CAM-01</span>
          <span class="hud-tag" id="hud-time">--:--:--</span>
          <span class="hud-tag" id="hud-fps">FPS: --</span>
        </div>

        <div class="camera-hud-br">
          <div id="rec-indicator">
            <div class="rec-dot"></div>
            ARMED
          </div>
        </div>

        <div id="motion-banner">// MOTION DETECTED //</div>

        <div class="no-camera-msg" id="no-camera-msg">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M23 7l-7 5 7 5V7z"/>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
            <line x1="2" y1="2" x2="22" y2="22" stroke="currentColor"/>
          </svg>
          <span>CAMERA OFFLINE</span>
          <span style="font-size:10px;opacity:0.6">Click START CAMERA to begin</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls-bar">
        <button class="btn primary" id="btn-start">START CAMERA</button>
        <button class="btn active-armed" id="btn-arm" disabled>ARM</button>

        <div class="sep"></div>

        <div class="ctrl-group">
          <span class="ctrl-label">GRID</span>
          <div class="grid-opts">
            <button class="grid-btn" data-grid="2">2×2</button>
            <button class="grid-btn active" data-grid="3">3×3</button>
            <button class="grid-btn" data-grid="4">4×4</button>
          </div>
        </div>

        <div class="sep"></div>

        <div class="ctrl-group">
          <span class="ctrl-label">SENSITIVITY</span>
          <div class="slider-wrap">
            <input type="range" id="sensitivity" min="1" max="100" value="30">
            <span class="slider-val" id="sens-val">30</span>
          </div>
        </div>

        <div class="sep"></div>

        <button class="btn" id="btn-mute">MUTE ALARM</button>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">

      <!-- Stats -->
      <div class="panel-section">
        <div class="section-title">SYSTEM STATUS</div>
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-label">ALERTS</div>
            <div class="stat-value red" id="stat-alerts">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">ACTIVE ZONES</div>
            <div class="stat-value accent" id="stat-zones">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">LOG ENTRIES</div>
            <div class="stat-value" id="stat-log">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">UPTIME</div>
            <div class="stat-value" id="stat-uptime">--:--</div>
          </div>
        </div>
      </div>

      <!-- Zone Heat Map -->
      <div class="panel-section">
        <div class="section-title">ZONE ACTIVITY</div>
        <div class="zone-grid-display" id="zone-grid-display"></div>
      </div>

      <!-- Detection Log -->
      <div class="panel-section">
        <div class="section-title">DETECTION LOG</div>
        <div class="log-wrap" id="log-wrap">
          <div class="log-empty" id="log-empty">NO EVENTS RECORDED</div>
        </div>
        <div class="log-controls">
          <button class="btn-sm" id="btn-clear-log">CLEAR LOG</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ── State ──
  const state = {
    running: false,
    armed: false,
    muted: false,
    gridSize: 3,
    sensitivity: 30,
    alertCount: 0,
    logEntries: [],
    startTime: null,
    frameCount: 0,
    lastFpsTime: 0,
    fps: 0,
    motionActive: false,
    motionCooldown: 0,
  };

  // Per-zone: score (0–100), alerting (bool)
  let zones = [];
  let prevImageData = null;

  // ── DOM refs ──
  const video       = document.getElementById('video');
  const canvasVideo = document.getElementById('canvas-video');
  const canvasOvl   = document.getElementById('canvas-overlay');
  const ctxVideo    = canvasVideo.getContext('2d', { willReadFrequently: true });
  const ctxOvl      = canvasOvl.getContext('2d');
  const noCamMsg    = document.getElementById('no-camera-msg');
  const btnStart    = document.getElementById('btn-start');
  const btnArm      = document.getElementById('btn-arm');
  const btnMute     = document.getElementById('btn-mute');
  const btnClearLog = document.getElementById('btn-clear-log');
  const sensSlider  = document.getElementById('sensitivity');
  const sensVal     = document.getElementById('sens-val');
  const statusDot   = document.getElementById('status-dot');
  const statusText  = document.getElementById('status-text');
  const hudTime     = document.getElementById('hud-time');
  const hudFps      = document.getElementById('hud-fps');
  const recIndicator= document.getElementById('rec-indicator');
  const motionBanner= document.getElementById('motion-banner');
  const zoneDisplay = document.getElementById('zone-grid-display');
  const logWrap     = document.getElementById('log-wrap');
  const logEmpty    = document.getElementById('log-empty');
  const statAlerts  = document.getElementById('stat-alerts');
  const statZones   = document.getElementById('stat-zones');
  const statLog     = document.getElementById('stat-log');
  const statUptime  = document.getElementById('stat-uptime');
  const cameraWrap  = document.getElementById('camera-wrap');

  // ── Audio ──
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function beep(freq, duration, volume) {
    if (state.muted) return;
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      gain.gain.setValueAtTime(volume * 0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
    } catch(_) {}
  }

  function alarmBeep() {
    beep(880, 0.12, 0.7);
    setTimeout(() => beep(660, 0.12, 0.5), 140);
  }

  // ── Zone init ──
  function initZones() {
    const n = state.gridSize;
    zones = [];
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        zones.push({ row: r, col: c, score: 0, alerting: false, warnCooldown: 0 });
      }
    }
    buildZoneDisplay();
    prevImageData = null;
  }

  function buildZoneDisplay() {
    const n = state.gridSize;
    zoneDisplay.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
    zoneDisplay.innerHTML = '';
    for (let i = 0; i < zones.length; i++) {
      const z = zones[i];
      const cell = document.createElement('div');
      cell.className = 'zone-cell';
      cell.id = `zone-cell-${i}`;
      cell.innerHTML = `
        <div class="zone-cell-label">Z${z.row+1},${z.col+1}</div>
        <div class="zone-cell-score" id="zone-score-${i}">0</div>
        <div class="zone-bar"><div class="zone-bar-fill" id="zone-bar-${i}" style="width:0%"></div></div>
      `;
      zoneDisplay.appendChild(cell);
    }
  }

  // ── Camera start ──
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      noCamMsg.style.display = 'none';
      state.running = true;
      state.startTime = Date.now();
      btnStart.textContent = 'STOP CAMERA';
      btnStart.classList.remove('primary');
      btnStart.classList.add('danger');
      btnArm.disabled = false;
      requestAnimationFrame(tick);
    } catch(e) {
      noCamMsg.querySelector('span').textContent = 'CAMERA ACCESS DENIED';
      console.error('Camera error:', e);
    }
  }

  function stopCamera() {
    state.running = false;
    state.armed = false;
    if (video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.stop());
      video.srcObject = null;
    }
    noCamMsg.style.display = 'flex';
    ctxVideo.clearRect(0, 0, canvasVideo.width, canvasVideo.height);
    ctxOvl.clearRect(0, 0, canvasOvl.width, canvasOvl.height);
    btnStart.textContent = 'START CAMERA';
    btnStart.classList.add('primary');
    btnStart.classList.remove('danger');
    btnArm.disabled = true;
    btnArm.textContent = 'ARM';
    btnArm.classList.remove('active-armed', 'danger');
    btnArm.classList.add('active-armed');
    updateArmStatus();
    prevImageData = null;
  }

  // ── Main loop ──
  function tick(timestamp) {
    if (!state.running) return;

    // Sync canvas size to container
    const wrap = cameraWrap;
    const w = wrap.clientWidth;
    const h = wrap.clientHeight;
    if (canvasVideo.width !== w || canvasVideo.height !== h) {
      canvasVideo.width = w;
      canvasVideo.height = h;
      canvasOvl.width = w;
      canvasOvl.height = h;
    }

    // Draw video frame
    if (video.readyState >= 2) {
      ctxVideo.drawImage(video, 0, 0, w, h);
    }

    // FPS tracking
    state.frameCount++;
    if (timestamp - state.lastFpsTime >= 1000) {
      state.fps = Math.round(state.frameCount * 1000 / (timestamp - state.lastFpsTime));
      state.frameCount = 0;
      state.lastFpsTime = timestamp;
    }

    // Motion detection (every 2 frames)
    if (state.running && (state.frameCount % 2 === 0 || state.frameCount === 1)) {
      detectMotion(w, h);
    }

    drawOverlay(w, h);
    updateHUD();
    updateStats();

    requestAnimationFrame(tick);
  }

  // ── Motion detection ──
  function detectMotion(w, h) {
    if (w === 0 || h === 0) return;

    let currentData;
    try {
      currentData = ctxVideo.getImageData(0, 0, w, h);
    } catch(_) { return; }

    if (!prevImageData || prevImageData.width !== w || prevImageData.height !== h) {
      prevImageData = currentData;
      return;
    }

    const n = state.gridSize;
    const zoneW = Math.floor(w / n);
    const zoneH = Math.floor(h / n);
    const pixels = currentData.data;
    const prevPixels = prevImageData.data;
    const threshold = state.sensitivity;

    // Per-zone diff accumulator
    const zoneDiffs = new Float64Array(n * n);
    const zoneCounts = new Int32Array(n * n);

    for (let y = 0; y < h; y++) {
      const row = Math.min(Math.floor(y / zoneH), n - 1);
      for (let x = 0; x < w; x++) {
        const col = Math.min(Math.floor(x / zoneW), n - 1);
        const idx = (y * w + x) * 4;
        const dr = Math.abs(pixels[idx]   - prevPixels[idx]);
        const dg = Math.abs(pixels[idx+1] - prevPixels[idx+1]);
        const db = Math.abs(pixels[idx+2] - prevPixels[idx+2]);
        const diff = (dr + dg + db) / 3;
        zoneDiffs[row * n + col] += diff;
        zoneCounts[row * n + col]++;
      }
    }

    let anyMotion = false;
    let activeZoneCount = 0;

    for (let i = 0; i < zones.length; i++) {
      const z = zones[i];
      const avgDiff = zoneCounts[i] > 0 ? zoneDiffs[i] / zoneCounts[i] : 0;
      // Normalize to 0–100 score: avgDiff is 0–255, scale relative to sensitivity
      const score = Math.min(100, Math.round((avgDiff / 255) * 100 * (100 / Math.max(threshold, 1))));
      z.score = score;

      const wasAlerting = z.alerting;
      z.alerting = (avgDiff > threshold);

      if (z.alerting) {
        activeZoneCount++;
        anyMotion = true;
        if (!wasAlerting && state.armed) {
          // New motion event
          logEvent(z.row, z.col);
          state.alertCount++;
          alarmBeep();
        }
      }

      if (z.warnCooldown > 0) z.warnCooldown--;
      if (z.alerting) z.warnCooldown = 8;
    }

    // Update motion banner cooldown
    if (anyMotion && state.armed) {
      state.motionActive = true;
      state.motionCooldown = 20;
    } else if (state.motionCooldown > 0) {
      state.motionCooldown--;
      if (state.motionCooldown === 0) state.motionActive = false;
    }

    prevImageData = currentData;
    updateZoneDisplay(activeZoneCount);
  }

  // ── Overlay drawing ──
  function drawOverlay(w, h) {
    ctxOvl.clearRect(0, 0, w, h);
    if (w === 0 || h === 0) return;

    const n = state.gridSize;
    const zoneW = w / n;
    const zoneH = h / n;

    for (let i = 0; i < zones.length; i++) {
      const z = zones[i];
      const x = z.col * zoneW;
      const y = z.row * zoneH;

      // Grid lines (always)
      ctxOvl.strokeStyle = 'rgba(34,211,238,0.18)';
      ctxOvl.lineWidth = 1;
      ctxOvl.strokeRect(x, y, zoneW, zoneH);

      // Zone label
      ctxOvl.fillStyle = 'rgba(34,211,238,0.45)';
      ctxOvl.font = '10px "DM Mono", monospace';
      ctxOvl.fillText(`Z${z.row+1},${z.col+1}`, x + 6, y + 16);

      // Alert highlight
      if (state.armed && z.alerting) {
        ctxOvl.strokeStyle = 'rgba(248,113,113,0.85)';
        ctxOvl.lineWidth = 2;
        ctxOvl.strokeRect(x + 1, y + 1, zoneW - 2, zoneH - 2);
        ctxOvl.fillStyle = 'rgba(248,113,113,0.07)';
        ctxOvl.fillRect(x, y, zoneW, zoneH);
        // Corner markers
        drawCorners(x, y, zoneW, zoneH, 'rgba(248,113,113,0.9)', 12, 2);
      } else if (state.armed && z.warnCooldown > 0) {
        ctxOvl.strokeStyle = 'rgba(251,191,36,0.5)';
        ctxOvl.lineWidth = 1.5;
        ctxOvl.strokeRect(x + 1, y + 1, zoneW - 2, zoneH - 2);
      }
    }

    // Outer frame border when armed
    if (state.armed) {
      ctxOvl.strokeStyle = state.motionActive ? 'rgba(248,113,113,0.6)' : 'rgba(34,211,238,0.25)';
      ctxOvl.lineWidth = state.motionActive ? 2 : 1;
      ctxOvl.strokeRect(1, 1, w - 2, h - 2);
    }

    // Scanline effect
    ctxOvl.strokeStyle = 'rgba(34,211,238,0.025)';
    ctxOvl.lineWidth = 1;
    const t = Date.now() % 4000 / 4000;
    const scanY = Math.floor(t * h);
    ctxOvl.beginPath();
    ctxOvl.moveTo(0, scanY);
    ctxOvl.lineTo(w, scanY);
    ctxOvl.stroke();
  }

  function drawCorners(x, y, w, h, color, size, lw) {
    ctxOvl.strokeStyle = color;
    ctxOvl.lineWidth = lw;
    const s = size;
    // TL
    ctxOvl.beginPath(); ctxOvl.moveTo(x, y + s); ctxOvl.lineTo(x, y); ctxOvl.lineTo(x + s, y); ctxOvl.stroke();
    // TR
    ctxOvl.beginPath(); ctxOvl.moveTo(x + w - s, y); ctxOvl.lineTo(x + w, y); ctxOvl.lineTo(x + w, y + s); ctxOvl.stroke();
    // BL
    ctxOvl.beginPath(); ctxOvl.moveTo(x, y + h - s); ctxOvl.lineTo(x, y + h); ctxOvl.lineTo(x + s, y + h); ctxOvl.stroke();
    // BR
    ctxOvl.beginPath(); ctxOvl.moveTo(x + w - s, y + h); ctxOvl.lineTo(x + w, y + h); ctxOvl.lineTo(x + w, y + h - s); ctxOvl.stroke();
  }

  // ── HUD update ──
  function updateHUD() {
    const now = new Date();
    hudTime.textContent = now.toTimeString().slice(0, 8);
    hudFps.textContent = `FPS: ${state.fps}`;
  }

  // ── Stats update ──
  function updateStats() {
    statAlerts.textContent = state.alertCount;
    if (state.startTime) {
      const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
      const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const s = String(elapsed % 60).padStart(2, '0');
      statUptime.textContent = `${m}:${s}`;
    }

    motionBanner.classList.toggle('active', state.motionActive && state.armed);
    recIndicator.classList.toggle('active', state.armed);
  }

  function updateZoneDisplay(activeCount) {
    statZones.textContent = activeCount;
    for (let i = 0; i < zones.length; i++) {
      const z = zones[i];
      const cell = document.getElementById(`zone-cell-${i}`);
      const scoreEl = document.getElementById(`zone-score-${i}`);
      const barEl = document.getElementById(`zone-bar-${i}`);
      if (!cell) continue;
      const pct = Math.min(100, z.score);
      scoreEl.textContent = z.score;
      barEl.style.width = pct + '%';
      cell.classList.toggle('alert', z.alerting && state.armed);
      cell.classList.toggle('warn', !z.alerting && z.warnCooldown > 0 && state.armed);
    }
  }

  // ── Arm status ──
  function updateArmStatus() {
    if (state.armed) {
      statusDot.className = 'armed';
      statusText.textContent = 'ARMED';
      btnArm.textContent = 'DISARM';
      btnArm.classList.remove('active-armed');
      btnArm.classList.add('danger');
    } else {
      statusDot.className = 'disarmed';
      statusText.textContent = 'DISARMED';
      btnArm.textContent = 'ARM';
      btnArm.classList.remove('danger');
      btnArm.classList.add('active-armed');
      state.motionActive = false;
      state.motionCooldown = 0;
      motionBanner.classList.remove('active');
      // Reset zone alerts visually
      for (let i = 0; i < zones.length; i++) {
        zones[i].alerting = false;
        zones[i].warnCooldown = 0;
      }
    }
  }

  // ── Detection log ──
  function logEvent(row, col) {
    const now = new Date();
    const time = now.toTimeString().slice(0, 8);
    const entry = { time, row, col };
    state.logEntries.unshift(entry);
    if (state.logEntries.length > 50) state.logEntries.pop();
    statLog.textContent = state.logEntries.length;
    renderLog();
  }

  function renderLog() {
    if (state.logEntries.length === 0) {
      logWrap.innerHTML = '<div class="log-empty" id="log-empty">NO EVENTS RECORDED</div>';
      return;
    }
    logWrap.innerHTML = state.logEntries.map((e, idx) => `
      <div class="log-entry">
        <span class="log-time">${e.time}</span>
        <span class="log-msg"><span class="alert-tag">MOTION</span> — <span class="zone-tag">Zone ${e.row+1},${e.col+1}</span></span>
      </div>
    `).join('');
  }

  // ── Event listeners ──
  btnStart.addEventListener('click', () => {
    if (state.running) stopCamera();
    else startCamera();
  });

  btnArm.addEventListener('click', () => {
    if (!state.running) return;
    state.armed = !state.armed;
    updateArmStatus();
    if (state.armed) {
      try { getAudioCtx().resume(); } catch(_) {}
      beep(440, 0.1, 0.4);
    } else {
      beep(330, 0.15, 0.3);
    }
  });

  btnMute.addEventListener('click', () => {
    state.muted = !state.muted;
    btnMute.textContent = state.muted ? 'UNMUTE ALARM' : 'MUTE ALARM';
    btnMute.classList.toggle('primary', state.muted);
  });

  sensSlider.addEventListener('input', () => {
    state.sensitivity = parseInt(sensSlider.value, 10);
    sensVal.textContent = state.sensitivity;
  });

  document.querySelectorAll('.grid-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.gridSize = parseInt(btn.dataset.grid, 10);
      initZones();
    });
  });

  btnClearLog.addEventListener('click', () => {
    state.logEntries = [];
    state.alertCount = 0;
    statAlerts.textContent = '0';
    statLog.textContent = '0';
    renderLog();
  });

  // HUD clock ticking even when camera off
  setInterval(() => {
    const now = new Date();
    hudTime.textContent = now.toTimeString().slice(0, 8);
  }, 1000);

  // ── Init ──
  initZones();
  updateArmStatus();
})();
</script>
</body>
</html>
